name: Weekly Policy Briefs Update

# F161 — Renamed from "Weekly Housing Intelligence Brief" to reflect what
# this cron actually does now. The internal "weekly brief" feature was
# retired in commit 0dbcd0d4 (Phase 1 security hardening, 2026-04-19):
# `private/weekly-brief/` was gitignored + removed from the index because
# the README admitted "It is not secured" and the directory was being
# served via GitHub Pages with no access control. The build_weekly_brief.py
# script went with it.
#
# What this workflow still does:
#   1. Populates scripts/alert_feeds.txt with the canonical RSS URL list.
#   2. Runs scripts/fetch_google_alerts.py to refresh
#      data/alerts/alerts_archive.json.
#   3. Runs scripts/generate_policy_briefs.py to refresh
#      data/policy_briefs.json — the file that powers the
#      policy-briefs.html page on the public site.
#   4. Commits the refreshed feeds + alerts + briefs back to main.
#
# Step (3) IS the public-facing brief; the retired private weekly-brief
# system was a separate internal payload that no longer ships.

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-policy-briefs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install feedparser

      - name: Populate alert_feeds.txt with production URLs
        run: |
          cat > scripts/alert_feeds.txt << 'FEEDS'
          # RSS feed URLs for housing news alerts (one per line)
          # Auto-populated by weekly_housing_brief.yml — do not edit manually

          # ── Google News: Colorado affordable housing topics ──
          https://news.google.com/rss/search?q=colorado+affordable+housing&hl=en-US&gl=US&ceid=US:en
          https://news.google.com/rss/search?q=colorado+zoning+land+use+housing&hl=en-US&gl=US&ceid=US:en
          https://news.google.com/rss/search?q=colorado+housing+policy+legislature&hl=en-US&gl=US&ceid=US:en
          https://news.google.com/rss/search?q=LIHTC+tax+credit+affordable+housing&hl=en-US&gl=US&ceid=US:en
          https://news.google.com/rss/search?q=CHFA+Colorado+housing+finance&hl=en-US&gl=US&ceid=US:en

          # ── NCSHA: National Council of State Housing Agencies ──
          https://www.ncsha.org/feed/

          # ── Novogradac: LIHTC & affordable housing news ──
          https://www.novoco.com/rss.xml

          # ── HUD: Exchange news and updates ──
          https://www.hudexchange.info/feed/

          # ── Colorado General Assembly: legislation tracking ──
          https://leg.colorado.gov/rss.xml
          FEEDS

      - name: Fetch RSS alerts
        env:
          ALERT_FEEDS_FILE: scripts/alert_feeds.txt
          ALERTS_MAX_AGE_DAYS: '90'
        run: |
          echo "── Fetching alerts at $(date -u) ──"
          python3 scripts/fetch_google_alerts.py
          echo "── Alert fetch complete ──"

      - name: Debug OPENAI_API_KEY presence
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "✓ OPENAI_API_KEY is set — LLM-assisted mode will be attempted"
          else
            echo "⚠ OPENAI_API_KEY is NOT set — briefs will use rule-based mode"
          fi

      - name: Generate policy briefs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRIEFS_MAX: '20'
        run: |
          echo "── Generating policy briefs at $(date -u) ──"
          python3 scripts/generate_policy_briefs.py
          echo "── Brief generation complete ──"
          python3 - <<'PY'
          import json
          with open("data/policy_briefs.json") as f:
              d = json.load(f)
          meta = d.get("meta", {})
          print(f"  Brief count    : {meta.get('brief_count', 0)}")
          print(f"  Source alerts  : {meta.get('source_alerts', 0)}")
          mode = "LLM-assisted" if "LLM-assisted" in meta.get("methodology", "") else "Rule-based"
          print(f"  Mode           : {mode}")
          PY

      # F161 — Removed the "Build weekly brief" step entirely. It was calling
      # private/weekly-brief/scripts/build_weekly_brief.py, which was deleted
      # from the index in commit 0dbcd0d4 (security hardening, see header).
      # The F157 `if [ -f … ]` guard kept the cron green but printed
      # "skipping" every Monday, giving a misleading "Weekly Housing
      # Intelligence Brief: success" signal in CI when nothing was actually
      # built. The real public-facing brief generation happens in the
      # `Generate policy briefs` step above (writes data/policy_briefs.json)
      # — that's the file the policy-briefs.html page reads from.

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # F161 — Stripped the `git add private/weekly-brief/` line.
          # private/ has been .gitignore'd since the Apr 19 security commit,
          # so the add was a no-op anyway, but leaving it implied this
          # workflow still ships a private brief. It doesn't.
          git add scripts/alert_feeds.txt
          git add data/alerts/alerts_archive.json
          git add data/policy_briefs.json
          git add robots.txt || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly policy briefs refresh $(date -u '+%Y-%m-%d')"
            # F161 — Rebase onto whatever's currently at origin/main before
            # pushing. The job runs for ~40s between checkout and push, and
            # other workflows (data-refresh cron, sync-data-mtimes, etc.)
            # frequently land on main in that window — without --rebase the
            # push fails with "remote contains work that you do not have".
            # --autostash handles the case where the working tree picked up
            # any unstaged transients from the network fetches.
            git pull --rebase --autostash origin main
            git push
          fi
