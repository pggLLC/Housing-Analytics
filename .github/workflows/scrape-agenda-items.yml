name: Scrape Council Agenda Items

# F169b (2026-06-04): for every jurisdiction in data/hna/local-resources.json
# WITH a `council_agenda_url`, fetch the page and extract recent housing-
# related agenda items (keywords: affordable, workforce, attainable,
# housing, ADU, inclusionary, zoning, rezone, comp plan, linkage fee).
# Plain fetch + regex parsing — no extra Node deps.
#
# Output: data/town-agendas.json — used by the HNA + Where Should I Build
# pages to surface what each town's council is currently considering.

on:
  schedule:
    - cron: '30 08 * * 1'   # Mondays 08:30 UTC (weekly, after URL discovery)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no writes / no commit)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax-check script
        run: node --check scripts/scrape_agenda_items.mjs

      - name: Scrape agenda items (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: node scripts/scrape_agenda_items.mjs --dry

      - name: Scrape agenda items
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/scrape_agenda_items.mjs

      - name: Commit updated town-agendas.json
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet data/town-agendas.json; then
            echo "No changes to data/town-agendas.json."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/town-agendas.json
          msg=$(mktemp)
          {
            printf 'data(F169b): refresh town-agendas housing items\n\n'
            printf 'Weekly scrape of council_agenda_url pages for housing-\n'
            printf 'related items (affordable / workforce / inclusionary /\n'
            printf 'zoning / comp plan / linkage fee). No external deps —\n'
            printf 'plain fetch + regex parsing.\n\n'
            printf 'Generated by .github/workflows/scrape-agenda-items.yml.\n'
          } > "$msg"
          git commit -F "$msg"
          rm -f "$msg"
          git pull --rebase origin main || true
          git push origin HEAD:main

      - name: Summarize
        if: always()
        run: |
          echo "Agenda items: data/town-agendas.json" >> "$GITHUB_STEP_SUMMARY"
          echo "(See step output above for per-jurisdiction item counts.)" >> "$GITHUB_STEP_SUMMARY"
