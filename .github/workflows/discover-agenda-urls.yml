name: Discover Council Agenda URLs

# F169a (2026-06-04): probe likely Civic Plus / Granicus / custom URL
# patterns for every curated jurisdiction in data/hna/local-resources.json
# that still lacks a `council_agenda_url`. For each candidate URL we
# HEAD-probe (with GET fallback), follow redirects, and accept 200/301/302.
#
# Outputs:
#   - data/agenda-url-discovery-report.json (committed)
#   - Markdown summary table in the run's step-summary tab
#
# Companion to:
#   - scripts/discover_agenda_urls.mjs
#   - .github/workflows/scrape-agenda-items.yml  (next step downstream)

on:
  schedule:
    - cron: '0 08 1 */3 *'   # 08:00 UTC on the 1st of Jan/Apr/Jul/Oct (quarterly)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no writes / no commit)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check script
        run: node --check scripts/discover_agenda_urls.mjs

      - name: Probe candidate agenda URLs (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: node scripts/discover_agenda_urls.mjs --dry

      - name: Probe candidate agenda URLs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/discover_agenda_urls.mjs

      - name: Commit updated discovery report
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet data/agenda-url-discovery-report.json; then
            echo "No changes to data/agenda-url-discovery-report.json."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/agenda-url-discovery-report.json
          msg=$(mktemp)
          {
            printf 'chore(F169a): refresh agenda-url discovery report\n\n'
            printf 'Quarterly probe of Civic Plus / Granicus / custom URL\n'
            printf 'patterns for jurisdictions in data/hna/local-resources.json\n'
            printf 'that still lack a council_agenda_url.\n\n'
            printf 'Generated by .github/workflows/discover-agenda-urls.yml.\n'
          } > "$msg"
          git commit -F "$msg"
          rm -f "$msg"
          git pull --rebase origin main || true
          git push origin HEAD:main

      - name: Summarize
        if: always()
        run: |
          echo "Discovery report: data/agenda-url-discovery-report.json" >> "$GITHUB_STEP_SUMMARY"
          echo "(See step output above for full per-jurisdiction table.)" >> "$GITHUB_STEP_SUMMARY"
