name: Pages Deploy Watchdog

on:
  schedule:
    - cron: '35 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-main-deployed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout watchdog script
        uses: actions/checkout@v7

      - name: Confirm latest main is deployed and no Pages run is stuck
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WATCHDOG_BRANCH: main
          WATCHDOG_WORKFLOW_ID: deploy.yml
          WATCHDOG_GRACE_MINUTES: '20'
          WATCHDOG_STALE_ACTIVE_MINUTES: '120'
        run: node scripts/audit/pages-deploy-watchdog.mjs
