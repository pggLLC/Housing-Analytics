name: Run All Data Workflows

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  run-data-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trigger all data workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          # Explicit list of data-creation workflows only.
          # Excludes non-data workflows: ci-checks, deploy, site-audit,
          #   contrast-audit, daily-monitoring, redeploy-zip.
          DATA_WORKFLOWS=(
            "build-hna-data.yml"
            "cache-hud-gis-data.yml"
            "car-data-update.yml"
            "fetch-census-acs.yml"
            "fetch-chfa-lihtc.yml"
            "fetch-county-data.yml"
            "fetch-fred-data.yml"
            "fetch-kalshi.yml"
            "market_data_build.yml"
            "zillow-data-sync.yml"
          )

          > /tmp/trigger_times.txt
          triggered=0
          failed_trigger=0
          # Allow up to 30 seconds for a newly-dispatched workflow run to appear.
          RUN_ID_LOOKUP_ATTEMPTS=10
          RUN_ID_LOOKUP_SLEEP_SECONDS=3

          for workflow in "${DATA_WORKFLOWS[@]}"; do
            echo "▶ Triggering: $workflow"
            TRIGGER_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            extra_inputs=""
            if gh workflow run "$workflow" --repo "$REPO" --ref "$REF" $extra_inputs 2>&1; then
              echo "  ✅ Triggered"
              echo "${workflow}=${TRIGGER_TIME}" >> /tmp/trigger_times.txt
              triggered=$((triggered + 1))
              run_id=""
              for _ in $(seq 1 "$RUN_ID_LOOKUP_ATTEMPTS"); do
                run_id=$(gh run list --workflow "$workflow" --repo "$REPO" \
                  --limit 5 --json databaseId,createdAt,event,headBranch \
                  --jq "[.[] | select(.createdAt >= \"$TRIGGER_TIME\" and .event == \"workflow_dispatch\" and .headBranch == \"$REF\")] | .[0].databaseId // empty" \
                  2>/dev/null)
                [ -n "$run_id" ] && break
                sleep "$RUN_ID_LOOKUP_SLEEP_SECONDS"
              done
              if [ -n "$run_id" ]; then
                echo "  ⏳ Waiting for $workflow run #$run_id to complete before triggering the next workflow"
                if gh run watch "$run_id" --repo "$REPO" --interval 30 >/dev/null 2>&1; then
                  echo "  ✅ $workflow run #$run_id completed"
                else
                  echo "  ⚠️  Could not watch $workflow run #$run_id to completion; continuing"
                fi
              else
                echo "  ⚠️  Could not resolve run ID for $workflow immediately; continuing"
              fi
            else
              echo "  ❌ Failed to trigger"
              echo "::error::Failed to trigger data workflow: $workflow"
              failed_trigger=$((failed_trigger + 1))
            fi
            sleep 2
          done

          echo ""
          echo "Triggered: $triggered  |  Failed to trigger: $failed_trigger"
          if [ "$failed_trigger" -gt 0 ]; then
            echo "::warning::$failed_trigger workflow(s) could not be triggered."
          fi

      - name: Collect run IDs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          # Allow GitHub enough time to queue the triggered runs.
          sleep 15

          > /tmp/run_ids.txt
          while IFS='=' read -r workflow trigger_time; do
            [ -z "$workflow" ] && continue
            run_id=$(gh run list --workflow "$workflow" --repo "$REPO" \
              --limit 5 --json databaseId,createdAt,event,headBranch \
              --jq "[.[] | select(.createdAt >= \"$trigger_time\" and .event == \"workflow_dispatch\" and .headBranch == \"$REF\")] | .[0].databaseId // empty" \
              2>/dev/null)
            if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
              echo "$workflow=$run_id" >> /tmp/run_ids.txt
              echo "  📋 $workflow → run #$run_id"
            else
              echo "  ⚠️  Run not found for $workflow (triggered at $trigger_time)"
              echo "$workflow=unknown" >> /tmp/run_ids.txt
            fi
          done < /tmp/trigger_times.txt

      - name: Wait for completions and report errors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          # Poll all triggered runs concurrently in a single loop.
          # Timeout: 45 minutes (90 polls × 30-second interval).
          MAX_POLLS=90
          # Allow up to 30 seconds for a newly-dispatched retry run to appear.
          RUN_ID_LOOKUP_ATTEMPTS=10
          RUN_ID_LOOKUP_SLEEP_SECONDS=3
          > /tmp/conclusions.txt

          for poll in $(seq 1 "$MAX_POLLS"); do
            all_done=true

            while IFS='=' read -r workflow run_id; do
              [ -z "$workflow" ] && continue
              # Skip workflows already concluded.
              grep -q "^${workflow}=" /tmp/conclusions.txt 2>/dev/null && continue

              if [ "$run_id" = "unknown" ]; then
                echo "$workflow=not_found" >> /tmp/conclusions.txt
                continue
              fi

              result=$(gh run view "$run_id" --repo "$REPO" \
                --json status,conclusion \
                --jq '.status + ":" + (.conclusion // "")' 2>/dev/null || echo "error:")

              run_status=$(echo "$result" | cut -d: -f1)
              conclusion=$(echo "$result" | cut -d: -f2)

              if [ "$run_status" = "completed" ]; then
                echo "$workflow=$conclusion" >> /tmp/conclusions.txt
                if [ "$conclusion" = "success" ]; then
                  echo "  ✅ $workflow: success"
                else
                  echo "  ❌ $workflow: $conclusion"
                  echo "::error::Data workflow failed: $workflow (conclusion: $conclusion)"
                fi
              else
                all_done=false
              fi
            done < /tmp/run_ids.txt

            [ "$all_done" = "true" ] && break
            echo "  … still waiting (poll $poll/$MAX_POLLS)"
            sleep 30
          done

          # Mark any runs that never concluded as timed out.
          while IFS='=' read -r workflow run_id; do
            [ -z "$workflow" ] && continue
            if ! grep -q "^${workflow}=" /tmp/conclusions.txt 2>/dev/null; then
              echo "$workflow=timeout" >> /tmp/conclusions.txt
              echo "  ⏰ $workflow: timed out"
              echo "::warning::Data workflow timed out: $workflow"
            fi
          done < /tmp/run_ids.txt

          # ─── RETRY PHASE ─────────────────────────────────────────────────────
          # Retry failed / timed-out workflows up to 2 times with exponential
          # backoff: 30 s before attempt 2, 60 s before attempt 3.
          > /tmp/retry_log.txt
          BACKOFFS=(30 60)

          for retry_attempt in 1 2; do
            # Collect every workflow that did not succeed in the previous round.
            retry_needed=()
            while IFS='=' read -r workflow conclusion; do
              [ -z "$workflow" ] && continue
              [ "$conclusion" != "success" ] && retry_needed+=("$workflow")
            done < /tmp/conclusions.txt

            [ ${#retry_needed[@]} -eq 0 ] && break

            backoff=${BACKOFFS[$((retry_attempt - 1))]}
            backoff=${backoff:-60}  # fallback if index is out of bounds
            echo "─────────────────────────────────────────────────────────────"
            echo "  RETRY $retry_attempt/2 — ${#retry_needed[@]} workflow(s) to retry after ${backoff}s"
            echo "─────────────────────────────────────────────────────────────"
            echo "::notice::Retry $retry_attempt/2 — retrying ${#retry_needed[@]} workflow(s) after ${backoff}s backoff"
            sleep "$backoff"

            # Re-trigger failed workflows.
            > "/tmp/retry_trigger_${retry_attempt}.txt"
            for workflow in "${retry_needed[@]}"; do
              echo "↩ Retry $retry_attempt: $workflow"
              TRIGGER_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              extra_inputs=""
              if gh workflow run "$workflow" --repo "$REPO" --ref "$REF" $extra_inputs 2>&1; then
                echo "  ✅ Re-triggered"
                echo "${workflow}=${TRIGGER_TIME}" >> "/tmp/retry_trigger_${retry_attempt}.txt"
                echo "${workflow}: attempt $((retry_attempt + 1)) triggered" >> /tmp/retry_log.txt
                run_id=""
                for _ in $(seq 1 "$RUN_ID_LOOKUP_ATTEMPTS"); do
                  run_id=$(gh run list --workflow "$workflow" --repo "$REPO" \
                    --limit 5 --json databaseId,createdAt,event,headBranch \
                    --jq "[.[] | select(.createdAt >= \"$TRIGGER_TIME\" and .event == \"workflow_dispatch\" and .headBranch == \"$REF\")] | .[0].databaseId // empty" \
                    2>/dev/null)
                  [ -n "$run_id" ] && break
                  sleep "$RUN_ID_LOOKUP_SLEEP_SECONDS"
                done
                if [ -n "$run_id" ]; then
                  echo "  ⏳ Waiting for retry run #$run_id to complete before triggering the next retry workflow"
                  if gh run watch "$run_id" --repo "$REPO" --interval 30 >/dev/null 2>&1; then
                    echo "  ✅ Retry run #$run_id completed"
                  else
                    echo "  ⚠️  Could not watch retry run #$run_id to completion; continuing"
                  fi
                else
                  echo "  ⚠️  Could not resolve retry run ID for $workflow immediately; continuing"
                fi
              else
                echo "  ❌ Failed to re-trigger"
                echo "${workflow}: attempt $((retry_attempt + 1)) trigger failed" >> /tmp/retry_log.txt
              fi
              sleep 2
            done

            # Allow GitHub time to queue the new runs.
            sleep 15

            # Collect run IDs for the retried workflows.
            > "/tmp/retry_ids_${retry_attempt}.txt"
            while IFS='=' read -r workflow trigger_time; do
              [ -z "$workflow" ] && continue
              run_id=$(gh run list --workflow "$workflow" --repo "$REPO" \
                --limit 5 --json databaseId,createdAt,event,headBranch \
                --jq "[.[] | select(.createdAt >= \"$trigger_time\" and .event == \"workflow_dispatch\" and .headBranch == \"$REF\")] | .[0].databaseId // empty" \
                2>/dev/null)
              if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
                echo "$workflow=$run_id" >> "/tmp/retry_ids_${retry_attempt}.txt"
                echo "  📋 $workflow → run #$run_id"
              else
                echo "  ⚠️  Run not found for $workflow"
                echo "$workflow=unknown" >> "/tmp/retry_ids_${retry_attempt}.txt"
              fi
            done < "/tmp/retry_trigger_${retry_attempt}.txt"

            # Wait for retry completions (same poll cadence as the initial wait).
            > "/tmp/retry_conclusions_${retry_attempt}.txt"
            for poll in $(seq 1 "$MAX_POLLS"); do
              all_done=true

              while IFS='=' read -r workflow run_id; do
                [ -z "$workflow" ] && continue
                grep -q "^${workflow}=" "/tmp/retry_conclusions_${retry_attempt}.txt" 2>/dev/null && continue

                if [ "$run_id" = "unknown" ]; then
                  echo "$workflow=not_found" >> "/tmp/retry_conclusions_${retry_attempt}.txt"
                  continue
                fi

                result=$(gh run view "$run_id" --repo "$REPO" \
                  --json status,conclusion \
                  --jq '.status + ":" + (.conclusion // "")' 2>/dev/null || echo "error:")

                run_status=$(echo "$result" | cut -d: -f1)
                conclusion=$(echo "$result" | cut -d: -f2)

                if [ "$run_status" = "completed" ]; then
                  echo "$workflow=$conclusion" >> "/tmp/retry_conclusions_${retry_attempt}.txt"
                  if [ "$conclusion" = "success" ]; then
                    echo "  ✅ $workflow: success (retry $retry_attempt)"
                  else
                    echo "  ❌ $workflow: $conclusion (retry $retry_attempt)"
                    # Only emit the error annotation after the final retry attempt.
                    if [ "$retry_attempt" -eq 2 ]; then
                      echo "::error::Data workflow still failing after all retries: $workflow (conclusion: $conclusion)"
                    fi
                  fi
                else
                  all_done=false
                fi
              done < "/tmp/retry_ids_${retry_attempt}.txt"

              [ "$all_done" = "true" ] && break
              echo "  … retry $retry_attempt still running (poll $poll/$MAX_POLLS)"
              sleep 30
            done

            # Mark any retry runs that timed out.
            while IFS='=' read -r workflow run_id; do
              [ -z "$workflow" ] && continue
              if ! grep -q "^${workflow}=" "/tmp/retry_conclusions_${retry_attempt}.txt" 2>/dev/null; then
                echo "$workflow=timeout" >> "/tmp/retry_conclusions_${retry_attempt}.txt"
                echo "  ⏰ $workflow: timed out (retry $retry_attempt)"
                echo "${workflow}: attempt $((retry_attempt + 1)) timed out" >> /tmp/retry_log.txt
              fi
            done < "/tmp/retry_ids_${retry_attempt}.txt"

            # Promote successful retry outcomes into the main conclusions file.
            while IFS='=' read -r workflow conclusion; do
              [ -z "$workflow" ] && continue
              if [ "$conclusion" = "success" ]; then
                grep -v "^${workflow}=" /tmp/conclusions.txt > /tmp/conclusions.tmp || true
                mv /tmp/conclusions.tmp /tmp/conclusions.txt
                echo "${workflow}=success" >> /tmp/conclusions.txt
                echo "${workflow}: attempt $((retry_attempt + 1)) succeeded" >> /tmp/retry_log.txt
              fi
            done < "/tmp/retry_conclusions_${retry_attempt}.txt"
          done
          # ─── END RETRY PHASE ─────────────────────────────────────────────────

          echo ""
          echo "============================================"
          echo "         DATA WORKFLOWS — FINAL REPORT     "
          echo "============================================"
          passed=0; failed=0; timedout=0; notfound=0

          while IFS='=' read -r workflow conclusion; do
            [ -z "$workflow" ] && continue
            # Annotate workflows that were retried.
            retry_info=""
            if grep -q "^${workflow}:" /tmp/retry_log.txt 2>/dev/null; then
              retry_count=$(grep -c "^${workflow}:.*triggered$" /tmp/retry_log.txt 2>/dev/null || true)
              [ "$retry_count" -gt 0 ] && retry_info=" (retried ×${retry_count})"
            fi
            case "$conclusion" in
              success)   echo "  ✅ $workflow${retry_info}"; passed=$((passed + 1)) ;;
              timeout)   echo "  ⏰ $workflow (timed out)${retry_info}"; timedout=$((timedout + 1)) ;;
              not_found) echo "  ❓ $workflow (run not found)${retry_info}"; notfound=$((notfound + 1)) ;;
              *)         echo "  ❌ $workflow ($conclusion)${retry_info}"; failed=$((failed + 1)) ;;
            esac
          done < /tmp/conclusions.txt

          echo ""
          echo "  Passed    : $passed"
          echo "  Failed    : $failed"
          echo "  Timed out : $timedout"
          echo "  Not found : $notfound"

          # Show the retry log summary when retries occurred.
          if [ -s /tmp/retry_log.txt ]; then
            echo ""
            echo "  ↩ Retry summary:"
            while IFS= read -r line; do
              echo "    $line"
            done < /tmp/retry_log.txt
          fi

          if [ "$failed" -gt 0 ] || [ "$timedout" -gt 0 ]; then
            exit 1
          fi

          echo ""
          echo "All data workflows completed successfully ✅"

      - name: Alert on workflow failures
        if: failure()
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode failure --workflow run-all-workflows.yml --run-id ${context.runId} --step "Wait for completions" --details "One or more data workflows failed or timed out during the weekly orchestration run. Check individual workflow logs for details."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }
            const title = `[Weekly Data Sync] One or more workflows failed — run #${context.runId}`;
            const body = [
              `The **Run All Data Workflows** orchestration run [#${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) reported one or more failures or timeouts.`,
              '',
              '### Next steps',
              '1. Open the run link above and inspect each failed child workflow.',
              '2. Re-trigger individual workflows with:',
              '   ```bash',
              `   gh workflow run market_data_build.yml --repo ${context.repo.owner}/${context.repo.repo}`,
              '   ```',
              '',
              'See `.github/WORKFLOW_TROUBLESHOOTING.md` for a full troubleshooting guide.',
            ].join('\n');
            const existingOrchestratorIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-orchestration-failure',
            });
            if (existingOrchestratorIssues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['workflow-orchestration-failure'],
              });
            }
