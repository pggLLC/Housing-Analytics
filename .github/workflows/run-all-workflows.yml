name: Run All Data Workflows

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  run-data-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger all data workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          # Explicit list of data-creation workflows only.
          # Excludes non-data workflows: ci-checks, deploy, site-audit,
          #   contrast-audit, daily-monitoring, redeploy-zip.
          DATA_WORKFLOWS=(
            "build-hna-data.yml"
            "build-market-data.yml"
            "cache-hud-gis-data.yml"
            "car-data-update.yml"
            "fetch-census-acs.yml"
            "fetch-chfa-lihtc.yml"
            "fetch-county-data.yml"
            "fetch-fred-data.yml"
            "fetch-kalshi.yml"
            "fetch-kashli-data.yml"     # separate script; note: 'kashli' is a legacy typo of 'kalshi'
            "fetch-lihtc-data.yml"
            "generate-housing-data.yml"
            "generate-market-analysis-data.yml"
            "zillow-data-sync.yml"
          )

          > /tmp/trigger_times.txt
          triggered=0
          failed_trigger=0

          for workflow in "${DATA_WORKFLOWS[@]}"; do
            echo "▶ Triggering: $workflow"
            TRIGGER_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            if gh workflow run "$workflow" --repo "$REPO" --ref "$REF" 2>&1; then
              echo "  ✅ Triggered"
              echo "${workflow}=${TRIGGER_TIME}" >> /tmp/trigger_times.txt
              triggered=$((triggered + 1))
            else
              echo "  ❌ Failed to trigger"
              echo "::error::Failed to trigger data workflow: $workflow"
              failed_trigger=$((failed_trigger + 1))
            fi
            sleep 2
          done

          echo ""
          echo "Triggered: $triggered  |  Failed to trigger: $failed_trigger"
          if [ "$failed_trigger" -gt 0 ]; then
            echo "::warning::$failed_trigger workflow(s) could not be triggered."
          fi

      - name: Collect run IDs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Allow GitHub enough time to queue the triggered runs.
          sleep 15

          > /tmp/run_ids.txt
          while IFS='=' read -r workflow trigger_time; do
            [ -z "$workflow" ] && continue
            run_id=$(gh run list --workflow "$workflow" --repo "$REPO" \
              --limit 5 --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"$trigger_time\")] | .[0].databaseId // empty" \
              2>/dev/null)
            if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
              echo "$workflow=$run_id" >> /tmp/run_ids.txt
              echo "  📋 $workflow → run #$run_id"
            else
              echo "  ⚠️  Run not found for $workflow (triggered at $trigger_time)"
              echo "$workflow=unknown" >> /tmp/run_ids.txt
            fi
          done < /tmp/trigger_times.txt

      - name: Wait for completions and report errors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Poll all triggered runs concurrently in a single loop.
          # Timeout: 45 minutes (90 polls × 30-second interval).
          MAX_POLLS=90
          > /tmp/conclusions.txt

          for poll in $(seq 1 "$MAX_POLLS"); do
            all_done=true

            while IFS='=' read -r workflow run_id; do
              [ -z "$workflow" ] && continue
              # Skip workflows already concluded.
              grep -q "^${workflow}=" /tmp/conclusions.txt 2>/dev/null && continue

              if [ "$run_id" = "unknown" ]; then
                echo "$workflow=not_found" >> /tmp/conclusions.txt
                continue
              fi

              result=$(gh run view "$run_id" --repo "$REPO" \
                --json status,conclusion \
                --jq '.status + ":" + (.conclusion // "")' 2>/dev/null || echo "error:")

              run_status=$(echo "$result" | cut -d: -f1)
              conclusion=$(echo "$result" | cut -d: -f2)

              if [ "$run_status" = "completed" ]; then
                echo "$workflow=$conclusion" >> /tmp/conclusions.txt
                if [ "$conclusion" = "success" ]; then
                  echo "  ✅ $workflow: success"
                else
                  echo "  ❌ $workflow: $conclusion"
                  echo "::error::Data workflow failed: $workflow (conclusion: $conclusion)"
                fi
              else
                all_done=false
              fi
            done < /tmp/run_ids.txt

            [ "$all_done" = "true" ] && break
            echo "  … still waiting (poll $poll/$MAX_POLLS)"
            sleep 30
          done

          # Mark any runs that never concluded as timed out.
          while IFS='=' read -r workflow run_id; do
            [ -z "$workflow" ] && continue
            if ! grep -q "^${workflow}=" /tmp/conclusions.txt 2>/dev/null; then
              echo "$workflow=timeout" >> /tmp/conclusions.txt
              echo "  ⏰ $workflow: timed out"
              echo "::warning::Data workflow timed out: $workflow"
            fi
          done < /tmp/run_ids.txt

          echo ""
          echo "============================================"
          echo "         DATA WORKFLOWS — FINAL REPORT     "
          echo "============================================"
          passed=0; failed=0; timedout=0; notfound=0

          while IFS='=' read -r workflow conclusion; do
            [ -z "$workflow" ] && continue
            case "$conclusion" in
              success)   echo "  ✅ $workflow"; passed=$((passed + 1)) ;;
              timeout)   echo "  ⏰ $workflow (timed out)"; timedout=$((timedout + 1)) ;;
              not_found) echo "  ❓ $workflow (run not found)"; notfound=$((notfound + 1)) ;;
              *)         echo "  ❌ $workflow ($conclusion)"; failed=$((failed + 1)) ;;
            esac
          done < /tmp/conclusions.txt

          echo ""
          echo "  Passed    : $passed"
          echo "  Failed    : $failed"
          echo "  Timed out : $timedout"
          echo "  Not found : $notfound"

          if [ "$failed" -gt 0 ] || [ "$timedout" -gt 0 ]; then
            exit 1
          fi

          echo ""
          echo "All data workflows completed successfully ✅"

      - name: Alert on workflow failures
        if: failure()
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode failure --workflow run-all-workflows.yml --run-id ${context.runId} --step "Wait for completions" --details "One or more data workflows failed or timed out during the weekly orchestration run. Check individual workflow logs for details."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }
            const title = `[Weekly Data Sync] One or more workflows failed — run #${context.runId}`;
            const body = [
              `The **Run All Data Workflows** orchestration run [#${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) reported one or more failures or timeouts.`,
              '',
              '### Next steps',
              '1. Open the run link above and inspect each failed child workflow.',
              '2. For **build-market-data** failures: verify `CENSUS_API_KEY` is set in [Settings → Secrets](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/settings/secrets/actions).',
              '3. Re-trigger individual workflows with:',
              '   ```bash',
              `   gh workflow run build-market-data.yml --repo ${context.repo.owner}/${context.repo.repo}`,
              '   ```',
              '',
              'See `.github/WORKFLOW_TROUBLESHOOTING.md` for a full troubleshooting guide.',
            ].join('\n');
            const existingOrchestratorIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-orchestration-failure',
            });
            if (existingOrchestratorIssues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['workflow-orchestration-failure'],
              });
            }
