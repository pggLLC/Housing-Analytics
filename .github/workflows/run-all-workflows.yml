name: Run All GIS Data Workflows

# Triggers all GIS data-update workflows and reports failures.
# Runs every Sunday at midnight UTC so that all cached data files are
# refreshed at the start of each week (complements the individual
# Monday/Sunday schedules on each data workflow).
#
# Non-data workflows (deploy, CI checks, audits) are excluded so that
# this weekly trigger never accidentally kicks off a production deploy.

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  discover-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover data workflows
        id: discover
        run: |
          self="run-all-workflows.yml"

          # Workflows that should NOT be triggered by this job —
          # deployments, CI checks, and UI/accessibility audits are excluded
          # to prevent accidental deploys and to keep the scope to data refreshes.
          declare -A SKIP_LIST
          SKIP_LIST["deploy.yml"]=1
          SKIP_LIST["redeploy-zip.yml"]=1
          SKIP_LIST["ci-checks.yml"]=1
          SKIP_LIST["contrast-audit.yml"]=1
          SKIP_LIST["site-audit.yml"]=1
          SKIP_LIST["daily-monitoring.yml"]=1

          workflows=()
          while IFS= read -r -d '' f; do
            name=$(basename "$f")
            if [ "$name" = "$self" ] || [ "${SKIP_LIST[$name]+_}" ]; then
              continue
            fi
            workflows+=("$name")
          done < <(find .github/workflows -maxdepth 1 -name "*.yml" -print0 | sort -z)

          echo "Data workflows to trigger:"
          for wf in "${workflows[@]}"; do
            echo "  - $wf"
          done

          # Encode as newline-delimited string for next step
          printf '%s\n' "${workflows[@]}" > /tmp/workflows.txt
          echo "count=${#workflows[@]}" >> "$GITHUB_OUTPUT"

      - name: Trigger each data workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          success=0
          failure=0
          skipped=0

          while IFS= read -r workflow; do
            [ -z "$workflow" ] && continue
            echo ""
            echo "▶ Triggering: $workflow"

            # Only trigger workflows that explicitly support workflow_dispatch
            if grep -qE '^\s+workflow_dispatch' ".github/workflows/$workflow" 2>/dev/null; then
              if gh workflow run "$workflow" --repo "$REPO" --ref "$REF" 2>&1; then
                echo "  ✅ Triggered successfully"
                success=$((success + 1))
              else
                echo "  ❌ Failed to trigger"
                failure=$((failure + 1))
              fi
            else
              echo "  ⚠️  No workflow_dispatch trigger — skipping"
              skipped=$((skipped + 1))
            fi

            # Delay between triggers to avoid rate limiting
            sleep 3
          done < /tmp/workflows.txt

          echo ""
          echo "=== Trigger Summary ==="
          echo "  Triggered successfully : $success"
          echo "  Failed to trigger      : $failure"
          echo "  Skipped (no dispatch)  : $skipped"

          if [ "$failure" -gt 0 ]; then
            echo "::error::$failure data workflow(s) failed to trigger. Check the logs above."
            exit 1
          fi
