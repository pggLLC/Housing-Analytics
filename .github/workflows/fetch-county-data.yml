name: Fetch County Demographics and Economic Data

# Refreshes county-level ACS demographic fallback data weekly so the
# market-intelligence page always has a local JSON file to fall back to
# when the Census API is slow or unavailable.
# Also refreshes the Economic Health KPIs (co-county-economic-indicators.json)
# using BLS LAUS, BLS QCEW, and ACS 5-year data.
#
# Schedule: every Monday at 06:00 UTC
# Manual: workflow_dispatch

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays at 06:00 UTC
  workflow_dispatch:        # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  fetch-county-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install --omit=dev node-fetch@2

      - name: Fetch ACS county demographics
        run: node scripts/fetch-county-demographics.js
        continue-on-error: true   # Non-fatal: retain existing file if Census API is down

      - name: Validate demographics output
        run: |
          if jq -e '.counties | type == "object"' data/co-county-demographics.json > /dev/null; then
            echo "✅ co-county-demographics.json is valid"
            echo "   Counties: $(jq '.counties | keys | length' data/co-county-demographics.json)"
          else
            echo "❌ co-county-demographics.json invalid — skipping commit"
            exit 1
          fi
        continue-on-error: true

      - name: Fetch county economic indicators (BLS LAUS + QCEW + ACS)
        env:
          BLS_API_KEY:    ${{ secrets.BLS_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python3 scripts/fetch_county_economic_indicators.py
        continue-on-error: true   # Non-fatal: retain existing file if APIs are down

      - name: Validate economic indicators output
        run: |
          if jq -e '.counties | type == "object"' data/co-county-economic-indicators.json > /dev/null; then
            echo "✅ co-county-economic-indicators.json is valid"
            echo "   Counties: $(jq '.counties | keys | length' data/co-county-economic-indicators.json)"
            echo "   Updated:  $(jq -r '.updated' data/co-county-economic-indicators.json)"
          else
            echo "❌ co-county-economic-indicators.json invalid"
            exit 1
          fi
        continue-on-error: true

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode empty-dataset --workflow fetch-county-data.yml --run-id ${context.runId} --data-file data/co-county-demographics.json --details "County demographics/economic data fetch failed. Check Census API and data sources."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }

      - name: Commit and push updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 scripts/rebuild_manifest.py
          git add data/co-county-demographics.json data/co-county-economic-indicators.json data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to county data files"
          else
            git commit -m "chore: refresh county demographics and economic indicators [$(date -u '+%Y-%m-%d')]"
            git pull --rebase origin main
            git push
          fi
