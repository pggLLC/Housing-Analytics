name: Generate Market Analysis Data

# Fetches and assembles all data files needed by the PMA scoring engine and
# the market-analysis.html map overlays:
#   - data/market/tract_centroids_co.json    (TIGERweb ArcGIS REST)
#   - data/market/acs_tract_metrics_co.json  (Census ACS 5-Year API)
#   - data/market/hud_lihtc_co.geojson       (HUD LIHTC public dataset)
#   - data/co-county-boundaries.json         (TIGERweb county polygons)
#
# QCTs (data/qct-colorado.json) and DDAs (data/dda-colorado.json) are managed
# separately by the cache-hud-gis-data.yml workflow.
#
# Runs weekly on Mondays at 04:00 UTC and on-demand via workflow_dispatch.

on:
  schedule:
    - cron: '0 4 * * 1'   # Mondays at 04:00 UTC
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh even if cache is fresh'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 1: Market data (tracts, ACS, LIHTC) ───────────────────────────
      - name: Diagnose TIGERweb API connectivity
        id: tigerweb_check
        continue-on-error: true
        run: |
          python scripts/market/test_tiger_api.py 2>&1 | tee /tmp/tigerweb_check.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Build market data artifacts
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          python scripts/market/build_public_market_data.py 2>&1 | tee /tmp/market_build.log
        timeout-minutes: 15

      # ── Step 2: County boundaries ──────────────────────────────────────────
      - name: Fetch Colorado county boundaries
        id: county_fetch
        continue-on-error: true
        run: |
          python - <<'EOF' 2>&1 | tee /tmp/county_fetch.log
          import json, random, sys, urllib.request, urllib.parse, urllib.error, time
          from pathlib import Path
          from datetime import datetime, timezone

          ROOT = Path(".")
          OUT  = ROOT / "data" / "co-county-boundaries.json"
          STATE_FIPS = "08"
          EXPECTED_COUNTIES = 64
          _TRANSIENT_HTTP_CODES = {429, 500, 502, 503, 504}

          TIGERWEB_COUNTIES = (
              "https://tigerweb.geo.census.gov/arcgis/rest/services/"
              "TIGERweb/State_County/MapServer/1"
          )

          def _ts():
              return datetime.now(timezone.utc).strftime("%H:%M:%S")

          def log(msg, level="INFO"):
              print(f"[{_ts()}] [{level}] {msg}", flush=True)

          def _next_wait(attempt, backoff_base=5.0, max_backoff=60.0):
              """Exponential backoff with +0–20 % jitter."""
              base = min(backoff_base * (2**attempt), max_backoff)
              return base + random.uniform(0, base * 0.2)

          def fetch_with_retry(url, retries=4, timeout=60, backoff_base=5.0, max_backoff=60.0):
              last_err = None
              t0 = time.monotonic()
              for attempt in range(retries):
                  try:
                      log(f"[fetch attempt {attempt+1}/{retries}] {url[:120]}")
                      req = urllib.request.Request(url, headers={"User-Agent": "pma-build/1.0"})
                      with urllib.request.urlopen(req, timeout=timeout) as r:
                          status = r.status
                          log(f"HTTP {status} in {time.monotonic()-t0:.1f}s")
                          return json.loads(r.read())
                  except urllib.error.HTTPError as e:
                      last_err = e
                      if e.code not in _TRANSIENT_HTTP_CODES:
                          raise RuntimeError(f"HTTP {e.code} (non-retryable): {e.reason} | {url[:120]}") from e
                  except Exception as e:
                      last_err = e
                  if attempt < retries - 1:
                      wait = _next_wait(attempt, backoff_base, max_backoff)
                      log(f"[retry {attempt+1}/{retries-1}] {last_err} — waiting {wait:.1f}s", level="WARN")
                      time.sleep(wait)
              raise RuntimeError(
                  f"Failed after {retries} attempts ({time.monotonic()-t0:.1f}s): {last_err} | {url[:120]}"
              ) from last_err

          def arcgis_query(layer_url, where="1=1", offset=0, limit=100):
              # outFields must match the actual fields in the TIGERweb State_County
              # layer.  GEOID is not present in this layer; requesting it causes
              # ArcGIS to return an error JSON ({"error":...}) with no "features"
              # key, which silently yields 0 results.
              params = urllib.parse.urlencode({
                  "where": where,
                  "outFields": "STATEFP,COUNTYFP,NAME,NAMELSAD",
                  "returnGeometry": "true", "f": "geojson", "outSR": "4326",
                  "resultRecordCount": str(limit), "resultOffset": str(offset),
              })
              url = f"{layer_url}/query?{params}"
              data = fetch_with_retry(url)
              if "error" in data:
                  err = data["error"]
                  code = err.get("code", "?")
                  msg  = err.get("message", str(err))
                  details = err.get("details") or err.get("messageCode", "")
                  detail_str = f" — details: {details}" if details else ""
                  raise RuntimeError(
                      f"ArcGIS error (code {code}): {msg}{detail_str} | {url[:120]}"
                  )
              return data

          log("[county] Fetching Colorado county boundaries from TIGERweb…")
          features = []
          offset = 0
          for page_num in range(5):  # safety cap: 5 pages × 100 = 500 (CO has 64)
              try:
                  page = arcgis_query(TIGERWEB_COUNTIES,
                                      where=f"STATEFP='{STATE_FIPS}'",
                                      offset=offset, limit=100)
              except RuntimeError as e:
                  log(f"Page {page_num+1} failed: {e}\n"
                      "  → Recovery: check https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/State_County/MapServer",
                      level="ERROR")
                  raise
              batch = page.get("features", [])
              features.extend(batch)
              log(f"page {page_num + 1}: got {len(batch)} features (total {len(features)})")
              if len(batch) < 100:
                  break
              offset += len(batch)
              time.sleep(0.5)

          if len(features) == 0:
              log("TIGERweb returned 0 features for "
                  f"STATEFP='{STATE_FIPS}'. Check that the STATE_FIPS value "
                  "is correct and that the TIGERweb service is reachable.",
                  level="ERROR")
              sys.exit(1)

          if len(features) != EXPECTED_COUNTIES:
              log(f"expected {EXPECTED_COUNTIES} counties, got {len(features)}", level="WARN")

          gj = {
              "type": "FeatureCollection",
              "meta": {
                  "source": "US Census TIGERweb ArcGIS REST (public)",
                  "state": "Colorado",
                  "state_fips": STATE_FIPS,
                  "generated": datetime.now(timezone.utc).strftime("%Y-%m-%d"),
              },
              "features": features,
          }
          OUT.parent.mkdir(parents=True, exist_ok=True)
          OUT.write_text(json.dumps(gj, ensure_ascii=False))
          log(f"Wrote {len(features)} counties to {OUT} ({OUT.stat().st_size:,} bytes)")
          EOF
        timeout-minutes: 5

      # ── Step 3: Validate all artifacts ────────────────────────────────────
      - name: Validate artifacts
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          ROOT = Path(".")
          # County boundaries are fetched with continue-on-error, so treat them
          # as non-required here (the step outputs a warning instead of failing).
          checks = [
              ("data/market/tract_centroids_co.json",  "tracts",   True),
              ("data/market/acs_tract_metrics_co.json", "tracts",  True),
              ("data/market/hud_lihtc_co.geojson",     "features", True),
              ("data/co-county-boundaries.json",        "features", False),
          ]
          errors = []
          for path, key, required in checks:
              p = ROOT / path
              if not p.exists():
                  if required:
                      errors.append(f"Missing: {path}")
                  else:
                      print(f"::warning::Optional artifact missing: {path}", flush=True)
                  continue
              try:
                  obj = json.loads(p.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f"Invalid JSON in {path}: {e}")
                  continue
              arr = obj.get(key)
              if not isinstance(arr, list):
                  errors.append(f"{path}: '{key}' is not an array")
              elif required and len(arr) == 0:
                  errors.append(f"{path}: '{key}' array is unexpectedly empty")
              else:
                  print(f"✓ {path}: {len(arr)} {key}")
          if errors:
              for e in errors:
                  print(f"::error::{e}", flush=True)
              sys.exit(1)
          print("All artifacts valid.")
          EOF

      # ── Step 4: Upload diagnostic logs as artifacts ───────────────────────
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-build-logs
          path: |
            /tmp/tigerweb_check.log
            /tmp/market_build.log
            /tmp/county_fetch.log
          if-no-files-found: ignore
          retention-days: 7

      # ── Step 5: Commit updated files ──────────────────────────────────────
      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/ data/co-county-boundaries.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): regenerate market analysis data [skip ci]"
            git push
          fi
