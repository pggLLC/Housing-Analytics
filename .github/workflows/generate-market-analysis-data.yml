name: Generate Market Analysis Data

# Fetches and assembles all data files needed by the PMA scoring engine and
# the market-analysis.html map overlays:
#   - data/market/tract_centroids_co.json    (TIGERweb ArcGIS REST)
#   - data/market/acs_tract_metrics_co.json  (Census ACS 5-Year API)
#   - data/market/hud_lihtc_co.geojson       (HUD LIHTC public dataset)
#   - data/co-county-boundaries.json         (TIGERweb county polygons)
#
# QCTs (data/qct-colorado.json) and DDAs (data/dda-colorado.json) are managed
# separately by the cache-hud-gis-data.yml workflow.
#
# Runs weekly on Mondays at 04:00 UTC and on-demand via workflow_dispatch.

on:
  schedule:
    - cron: '0 4 * * 1'   # Mondays at 04:00 UTC
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh even if cache is fresh'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 1: Market data (tracts, ACS, LIHTC) ───────────────────────────
      - name: Build market data artifacts
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          python scripts/market/build_public_market_data.py
        timeout-minutes: 15

      # ── Step 2: County boundaries ──────────────────────────────────────────
      - name: Fetch Colorado county boundaries
        run: |
          python - <<'EOF'
          import json, sys, urllib.request, urllib.parse, time
          from pathlib import Path
          from datetime import datetime, timezone

          ROOT = Path(".")
          OUT  = ROOT / "data" / "co-county-boundaries.json"
          STATE_FIPS = "08"
          EXPECTED_COUNTIES = 64

          TIGERWEB_COUNTIES = (
              "https://tigerweb.geo.census.gov/arcgis/rest/services/"
              "TIGERweb/State_County/MapServer/1"
          )

          def arcgis_query(layer_url, where="1=1", offset=0, limit=100):
              # outFields must match the actual fields in the TIGERweb State_County
              # layer.  GEOID is not present in this layer; requesting it causes
              # ArcGIS to return an error JSON ({"error":...}) with no "features"
              # key, which silently yields 0 results.
              params = urllib.parse.urlencode({
                  "where": where,
                  "outFields": "STATEFP,COUNTYFP,NAME,NAMELSAD",
                  "returnGeometry": "true", "f": "geojson", "outSR": "4326",
                  "resultRecordCount": str(limit), "resultOffset": str(offset),
              })
              url = f"{layer_url}/query?{params}"
              print(f"  [fetch] {url[:100]}")
              req = urllib.request.Request(url, headers={"User-Agent": "pma-build/1.0"})
              with urllib.request.urlopen(req, timeout=60) as r:
                  data = json.loads(r.read())
              if "error" in data:
                  raise RuntimeError(
                      f"ArcGIS error: {data['error'].get('message', data['error'])}"
                  )
              return data

          print("[county] Fetching Colorado county boundaries from TIGERweb…")
          features = []
          offset = 0
          for page_num in range(5):  # safety cap: 5 pages × 100 = 500 (CO has 64)
              page = arcgis_query(TIGERWEB_COUNTIES,
                                  where=f"STATEFP='{STATE_FIPS}'",
                                  offset=offset, limit=100)
              batch = page.get("features", [])
              features.extend(batch)
              print(f"  page {page_num + 1}: got {len(batch)} features "
                    f"(total {len(features)})")
              if len(batch) < 100:
                  break
              offset += len(batch)
              time.sleep(0.5)

          if len(features) == 0:
              print("[county] ERROR: TIGERweb returned 0 features for "
                    f"STATEFP='{STATE_FIPS}'. Check that the STATE_FIPS value "
                    "is correct and that the TIGERweb service is reachable.",
                    file=sys.stderr)
              sys.exit(1)

          if len(features) != EXPECTED_COUNTIES:
              print(f"[county] WARNING: expected {EXPECTED_COUNTIES} counties, "
                    f"got {len(features)}", file=sys.stderr)

          gj = {
              "type": "FeatureCollection",
              "meta": {
                  "source": "US Census TIGERweb ArcGIS REST (public)",
                  "state": "Colorado",
                  "state_fips": STATE_FIPS,
                  "generated": datetime.now(timezone.utc).strftime("%Y-%m-%d"),
              },
              "features": features,
          }
          OUT.parent.mkdir(parents=True, exist_ok=True)
          OUT.write_text(json.dumps(gj, ensure_ascii=False))
          print(f"[county] Wrote {len(features)} counties to {OUT} "
                f"({OUT.stat().st_size:,} bytes)")
          EOF
        timeout-minutes: 5

      # ── Step 3: Validate all artifacts ────────────────────────────────────
      - name: Validate artifacts
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          ROOT = Path(".")
          checks = [
              ("data/market/tract_centroids_co.json",  "tracts",   True),
              ("data/market/acs_tract_metrics_co.json", "tracts",  True),
              ("data/market/hud_lihtc_co.geojson",     "features", True),
              ("data/co-county-boundaries.json",        "features", True),
          ]
          errors = []
          for path, key, required in checks:
              p = ROOT / path
              if not p.exists():
                  errors.append(f"Missing: {path}")
                  continue
              try:
                  obj = json.loads(p.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f"Invalid JSON in {path}: {e}")
                  continue
              arr = obj.get(key)
              if not isinstance(arr, list):
                  errors.append(f"{path}: '{key}' is not an array")
              elif required and len(arr) == 0:
                  errors.append(f"{path}: '{key}' array is unexpectedly empty")
              else:
                  print(f"✓ {path}: {len(arr)} {key}")
          if errors:
              for e in errors:
                  print(f"::error::{e}", flush=True)
              sys.exit(1)
          print("All artifacts valid.")
          EOF

      # ── Step 4: Commit updated files ──────────────────────────────────────
      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/ data/co-county-boundaries.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): regenerate market analysis data [skip ci]"
            git push
          fi
