name: Build HNA Data Cache

on:
  schedule:
    - cron: '30 6 * * 1'  # Mondays 06:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-hna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Environment check
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          echo "── Python version ──"
          python3 --version
          echo "── Disk space ──"
          df -h .
          echo "── CENSUS_API_KEY ──"
          python3 -c "
          import os, sys
          k = os.environ.get('CENSUS_API_KEY', '').strip()
          if k:
              print(f'CENSUS_API_KEY: set ({len(k)} chars)')
          else:
              print('CENSUS_API_KEY: NOT SET — API calls will be unauthenticated', file=sys.stderr)
          "

      - name: Validate Python imports
        run: |
          python3 -c "
          import csv, gzip, io, json, os, sys, time, urllib.parse, urllib.request
          print('All required stdlib modules loaded OK')
          "

      - name: Pre-build diagnostics
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          python3 scripts/hna/diagnose.py || true

      - name: Build cached HNA datasets (ACS + LEHD + DOLA)
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          LODES_YEAR: '2022'
        run: |
          set -x
          python3 scripts/hna/build_hna_data.py 2>&1

      - name: Post-build verification
        run: |
          echo "── HNA output .json files ──"
          for dir in data/hna/summary data/hna/lehd data/hna/dola_sya data/hna/projections data/hna/derived; do
            echo ""
            echo "$dir:"
            if [ -d "$dir" ]; then
              count=$(find "$dir" -maxdepth 1 -name '*.json' | wc -l)
              total=$(find "$dir" -maxdepth 1 -name '*.json' -exec stat -c%s {} \; 2>/dev/null \
                      | awk '{s+=$1} END {print s+0}')
              echo "  files : $count"
              echo "  bytes : $total"
              find "$dir" -maxdepth 1 -name '*.json' -empty | \
                while read f; do echo "  ⚠ zero-byte: $f"; done
            else
              echo "  (directory not found)"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hna
          git diff --cached --quiet || git commit -m "chore: build HNA cache $(date -u +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
