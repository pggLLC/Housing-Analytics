name: Build HNA Data Cache

on:
  schedule:
    - cron: '30 6 * * 1'  # Mondays 06:30 UTC
  workflow_dispatch:
    inputs:
      statewide_only:
        description: 'Only refresh the statewide summary (data/hna/summary/08.json); skip the county build phases'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  build-hna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Environment check
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          echo "── Python version ──"
          python3 --version
          echo "── Disk space ──"
          df -h .
          echo "── CENSUS_API_KEY ──"
          # HARD GATE (2026-07-05 incident, reverted in 5ce4be764): keyless
          # Census API calls always fail, and a build run with a broken key
          # writes fetch failures through the whole data spine. Probe with a
          # real authenticated request and abort the run if it doesn't work.
          python3 -c "
          import os, sys, urllib.request, urllib.parse, json
          k = os.environ.get('CENSUS_API_KEY', '').strip()
          if not k:
              print('::error::CENSUS_API_KEY is NOT SET — aborting: keyless Census calls always fail and the build would write nulls', file=sys.stderr)
              sys.exit(1)
          url = f'https://api.census.gov/data/2024/acs/acs1/profile?get=DP02_0001E&for=state:08&key={urllib.parse.quote(k)}'
          try:
              rows = json.load(urllib.request.urlopen(url, timeout=30))
              assert rows and rows[1][0], 'empty response'
              print(f'CENSUS_API_KEY: set ({len(k)} chars) and VERIFIED (state households: {rows[1][0]})')
          except Exception as e:
              print(f'::error::CENSUS_API_KEY probe failed ({type(e).__name__}: {e}) — aborting before the build can write fetch failures over good data', file=sys.stderr)
              sys.exit(1)
          "

      - name: Validate Python imports
        run: |
          python3 -c "
          import csv, gzip, io, json, os, sys, time, urllib.parse, urllib.request
          print('All required stdlib modules loaded OK')
          "

      - name: Pre-build diagnostics
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          python3 scripts/hna/diagnose.py || true

      - name: Build cached HNA datasets (ACS + LEHD + DOLA)
        if: ${{ inputs.statewide_only != true }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          LODES_YEAR: '2022'
          SKIP_GEO_CONFIG: 'true'
        run: |
          set -x
          python3 scripts/hna/build_hna_data.py 2>&1

      - name: Phase 2.5 — Refresh statewide summary (data/hna/summary/08.json)
        # The statewide file has its own generator because it aggregates at
        # state:08 rather than looping counties. It sat hand-seeded from
        # 2026-03 to 2026-07 with structure counts stored under vacancy-rate
        # keys (the "151458.0%" bug, PR #1033) because no workflow ran it.
        # Blocking on statewide_only dispatches; non-blocking on full weekly
        # runs so a Census hiccup here can't discard a finished county build.
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          if [ "${{ inputs.statewide_only }}" = "true" ]; then
            python3 scripts/fetch_census_state_hna.py --validate-counties
          else
            python3 scripts/fetch_census_state_hna.py --validate-counties \
              || echo "::warning::Statewide summary fetch failed (non-critical; existing 08.json preserved)"
          fi

      - name: Phase 3 — Parse LEHD WAC historical employment
        if: ${{ inputs.statewide_only != true }}
        env:
          LODES_YEAR: '2023'
          LODES_YEARS: '2021,2022,2023'
          LODES_STATE: 'co'
        run: |
          echo "── Parsing LEHD WAC files (multi-year) ──"
          python3 scripts/hna/parse_lehd_wac.py 2>&1 || echo "::warning::LEHD WAC parse failed (non-critical; will retry next run)"

      - name: Phase 4 — Generate scenario data files (baseline / low / high growth)
        if: ${{ inputs.statewide_only != true }}
        run: |
          echo "── Building scenario JSON files ──"
          python3 scripts/hna/build_scenarios.py 2>&1 || echo "::warning::Scenario build failed (non-critical; existing files will be used)"

      - name: Phase 5 — Validate DOLA and FRED data quality
        if: ${{ inputs.statewide_only != true }}
        run: |
          echo "── Validating DOLA SYA and FRED data ──"
          python3 scripts/hna/validate_dola_fred_data.py 2>&1 || echo "::warning::Data validation warnings found — see output above"

      - name: Phase 6 — Build Housing Policy Scorecard
        if: ${{ inputs.statewide_only != true }}
        run: |
          echo "── Building housing policy scorecard ──"
          python3 scripts/policy/build_housing_scorecard.py 2>&1 || echo "::warning::Housing scorecard build failed (non-critical; existing file will be used)"

      - name: Phase 6.5 — Rebuild AMI gap files (place + county, direct ACS)
        if: ${{ inputs.statewide_only != true }}
        # Builds data/co_ami_gap_by_place.json AND data/co_ami_gap_by_county.json
        # from ACS B25118 (renter households — the gap demand side since
        # methodology v2) + B19001 (all-tenure legacy series) + B25063 (gross
        # rent supply side). Place-level data replaced the old practice of
        # proportionally scaling county aggregates by population share, which
        # made every place in the same county look like an identical per-capita
        # copy of its county (e.g. Fruita and Clifton showing the same AMI
        # mix). build_ranking_index.py prefers the place file when available
        # and falls back to county-scaled when missing. Without CENSUS_API_KEY
        # the script falls back to the keyless Census Reporter mirror.
        #
        # Non-blocking: existing files are preserved on script failure.
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          echo "── Rebuilding place-level AMI gap from ACS ──"
          python3 scripts/hna/build_place_ami_gap.py 2>&1 || echo "::warning::Place AMI gap rebuild failed (non-critical; build_ranking_index.py will fall back to county-scaled)"

      - name: Phase 7 — Rebuild HNA ranking index
        if: ${{ inputs.statewide_only != true }}
        # Regenerates data/hna/ranking-index.json — the file consumed by
        # the Comparative Analysis page (hna-comparative-analysis.html).
        # Reads the freshly built summary/projections/CHAS files from the
        # earlier phases and re-derives the comparative metrics + scores.
        #
        # Wired here on 2026-05-06 to close the structural gap that drove
        # data-freshness alerts #744-#748 (file aging past 9-day SLA with
        # no scheduled regen path). PR #749 had only band-aided the
        # generatedAt timestamp; the actual rebuild was never automated.
        # Non-blocking: existing file is preserved if the script fails so
        # one bad rebuild doesn't take the comparative-analysis page down.
        run: |
          echo "── Rebuilding HNA ranking index ──"
          python3 scripts/hna/build_ranking_index.py 2>&1 || echo "::warning::Ranking-index rebuild failed (non-critical; existing file will be used)"

      - name: Phase 7.5 — Rebuild ranking scenario overlays
        if: ${{ inputs.statewide_only != true }}
        # data/hna/ranking-scenarios/*.json embed the canonical index's
        # generatedAt as metadata.based_on, and test/ranking-scenarios.test.js
        # asserts they match. Every ranking-index rebuild therefore MUST be
        # followed by this step or the next PR's ci-checks fail. (The script
        # was briefly deleted by the post-merge quarantine bot after #1027;
        # restored + wired here in #1032.)
        run: |
          echo "── Rebuilding ranking scenario overlays ──"
          python3 scripts/hna/build_ranking_scenarios.py 2>&1 || echo "::warning::Ranking-scenarios rebuild failed (non-critical; existing files will be used, but ci-checks on later PRs may fail until regenerated)"

      - name: Phase 7.6 — Rebuild metric digests + brief metric-digest sections
        if: ${{ inputs.statewide_only != true }}
        # The jurisdiction metric digests embed ranking-index values, the
        # published briefs' metric-digest sections cite the digests, and CI's
        # test:jurisdiction-metrics-digest regenerates digests IN-PLACE before
        # test:briefs compares. Any ranking/summary rebuild that skips this
        # step leaves main latently broken: the next PR's ci-checks fail on
        # files it never touched (2026-07-05, twice). BLOCKING — a rebuilt
        # spine without matching digests must not be committed.
        run: |
          echo "── Rebuilding jurisdiction metric digests ──"
          node scripts/hna/build_jurisdiction_metrics_digest.mjs
          echo "── Regenerating brief metric-digest sections + verification reports ──"
          node scripts/generate-brief-metric-digest-sections.mjs
          echo "── Validating briefs against regenerated digests ──"
          python3 scripts/validate-jurisdiction-briefs.py

      - name: Post-build verification
        id: verify
        run: |
          echo "── HNA output .json files ──"
          total_files=0
          total_bytes=0
          for dir in data/hna/summary data/hna/lehd data/hna/dola_sya data/hna/projections data/hna/derived; do
            echo ""
            echo "$dir:"
            if [ -d "$dir" ]; then
              count=$(find "$dir" -maxdepth 1 -name '*.json' | wc -l)
              bytes=$(find "$dir" -maxdepth 1 -name '*.json' -exec stat -c%s {} \; 2>/dev/null \
                      | awk '{s+=$1} END {print s+0}')
              echo "  files : $count"
              echo "  bytes : $bytes"
              total_files=$((total_files + count))
              total_bytes=$((total_bytes + bytes))
              find "$dir" -maxdepth 1 -name '*.json' -empty | \
                while read f; do echo "  ⚠ zero-byte: $f"; done
            else
              echo "  (directory not found)"
            fi
          done
          echo ""
          echo "── Totals: ${total_files} files, ${total_bytes} bytes ──"
          if [ "$total_files" -eq 0 ]; then
            echo "::error::No HNA output files were produced"
            exit 1
          fi

          # Verify ranking-index.json was actually regenerated this run.
          # If Phase 7 silently used the existing file (script crash, no
          # output written), the data-freshness alert that opened #744-
          # #748 will keep firing — surface this as a CI warning so the
          # next run has a chance to fix it before the SLA breach repeats.
          if [ -f data/hna/ranking-index.json ]; then
            file_age_secs=$(( $(date +%s) - $(stat -c%Y data/hna/ranking-index.json) ))
            file_age_days=$(( file_age_secs / 86400 ))
            echo "── data/hna/ranking-index.json mtime age: ${file_age_days} days ──"
            if [ "$file_age_days" -gt 1 ]; then
              echo "::warning::ranking-index.json mtime is ${file_age_days} days old — Phase 7 likely failed to regenerate it. Check Phase 7 logs above."
            fi
          else
            echo "::warning::data/hna/ranking-index.json missing after build"
          fi

      - name: Alert on build failure
        if: failure()
        uses: actions/github-script@v9
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode failure --workflow build-hna-data.yml --run-id ${context.runId} --step "Build or Verify" --details "HNA data build produced no output files. Check Census API key and Python build logs."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }

      - name: Rebuild manifest.json
        run: |
          echo "── Regenerating data/manifest.json ──"
          python scripts/rebuild_manifest.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hna data/policy/housing-policy-scorecard.json data/manifest.json data/jurisdiction-briefs docs/qa 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: build HNA cache + scenarios data $(date -u +'%Y-%m-%d')"
          # F119 — was `git merge --strategy=ours origin/main` which is git's
          # most destructive merge: it accepts the merge commit but DISCARDS
          # every change from origin/main, keeping only the local tree. That
          # silently clobbered F119 on 2026-06-05 and would have wiped any
          # commit racing the bot. Now: rebase the bot's data-only commit on
          # top of current main so the rest of the tree is preserved. If a
          # real conflict surfaces (a human edited data/hna/* — extremely
          # rare), the workflow fails and the existing notify step alerts,
          # instead of shipping a destructive merge.
          # Only rebase onto origin/main when running ON main. On a feature
          # branch (workflow_dispatch --ref), rebasing onto main from the
          # shallow checkout produces add/add conflicts and the branch should
          # keep its own history anyway — just push the data commit.
          if [ "${{ github.ref_name }}" = "main" ]; then
            git fetch origin main
            # F122 — --autostash so the rebase doesn't fail when the build step
            # leaves unstaged changes outside the explicit `git add` list. The
            # previous --strategy=ours merge tolerated unstaged changes silently;
            # a plain `git rebase` errors with "cannot rebase: You have unstaged
            # changes". Autostash stashes them before the rebase and pops them
            # after, so the working-tree drift survives without blocking the push.
            git rebase --autostash origin/main
          fi
          git push

      - name: Notify on failure / close tracker on recovery
        if: always()
        uses: ./.github/actions/notify-workflow-outcome
        with:
          workflow_id: build-hna-data
          outcome: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          github_token: ${{ github.token }}
