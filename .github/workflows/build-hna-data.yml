name: Build HNA Data Cache

on:
  schedule:
    - cron: '30 6 * * 1'  # Mondays 06:30 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  build-hna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Environment check
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          echo "── Python version ──"
          python3 --version
          echo "── Disk space ──"
          df -h .
          echo "── CENSUS_API_KEY ──"
          python3 -c "
          import os, sys
          k = os.environ.get('CENSUS_API_KEY', '').strip()
          if k:
              print(f'CENSUS_API_KEY: set ({len(k)} chars)')
          else:
              print('CENSUS_API_KEY: NOT SET — API calls will be unauthenticated', file=sys.stderr)
          "

      - name: Validate Python imports
        run: |
          python3 -c "
          import csv, gzip, io, json, os, sys, time, urllib.parse, urllib.request
          print('All required stdlib modules loaded OK')
          "

      - name: Pre-build diagnostics
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          python3 scripts/hna/diagnose.py || true

      - name: Build cached HNA datasets (ACS + LEHD + DOLA)
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          LODES_YEAR: '2022'
          SKIP_GEO_CONFIG: 'true'
        run: |
          set -x
          python3 scripts/hna/build_hna_data.py 2>&1

      - name: Phase 3 — Parse LEHD WAC historical employment
        env:
          LODES_YEAR: '2023'
          LODES_YEARS: '2021,2022,2023'
          LODES_STATE: 'co'
        run: |
          echo "── Parsing LEHD WAC files (multi-year) ──"
          python3 scripts/hna/parse_lehd_wac.py 2>&1 || echo "::warning::LEHD WAC parse failed (non-critical; will retry next run)"

      - name: Phase 4 — Generate scenario data files (baseline / low / high growth)
        run: |
          echo "── Building scenario JSON files ──"
          python3 scripts/hna/build_scenarios.py 2>&1 || echo "::warning::Scenario build failed (non-critical; existing files will be used)"

      - name: Phase 5 — Validate DOLA and FRED data quality
        run: |
          echo "── Validating DOLA SYA and FRED data ──"
          python3 scripts/hna/validate_dola_fred_data.py 2>&1 || echo "::warning::Data validation warnings found — see output above"

      - name: Phase 6 — Build Housing Policy Scorecard
        run: |
          echo "── Building housing policy scorecard ──"
          python3 scripts/policy/build_housing_scorecard.py 2>&1 || echo "::warning::Housing scorecard build failed (non-critical; existing file will be used)"

      - name: Post-build verification
        id: verify
        run: |
          echo "── HNA output .json files ──"
          total_files=0
          total_bytes=0
          for dir in data/hna/summary data/hna/lehd data/hna/dola_sya data/hna/projections data/hna/derived; do
            echo ""
            echo "$dir:"
            if [ -d "$dir" ]; then
              count=$(find "$dir" -maxdepth 1 -name '*.json' | wc -l)
              bytes=$(find "$dir" -maxdepth 1 -name '*.json' -exec stat -c%s {} \; 2>/dev/null \
                      | awk '{s+=$1} END {print s+0}')
              echo "  files : $count"
              echo "  bytes : $bytes"
              total_files=$((total_files + count))
              total_bytes=$((total_bytes + bytes))
              find "$dir" -maxdepth 1 -name '*.json' -empty | \
                while read f; do echo "  ⚠ zero-byte: $f"; done
            else
              echo "  (directory not found)"
            fi
          done
          echo ""
          echo "── Totals: ${total_files} files, ${total_bytes} bytes ──"
          if [ "$total_files" -eq 0 ]; then
            echo "::error::No HNA output files were produced"
            exit 1
          fi

      - name: Alert on build failure
        if: failure()
        uses: actions/github-script@v9
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode failure --workflow build-hna-data.yml --run-id ${context.runId} --step "Build or Verify" --details "HNA data build produced no output files. Check Census API key and Python build logs."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }

      - name: Rebuild manifest.json
        run: |
          echo "── Regenerating data/manifest.json ──"
          python scripts/rebuild_manifest.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hna data/policy/housing-policy-scorecard.json data/manifest.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: build HNA cache + scenarios data $(date -u +'%Y-%m-%d')"
          git fetch origin main
          git merge --strategy=ours -m "Merge main (keeping auto-generated HNA data)" origin/main
          git push

      - name: Notify on failure / close tracker on recovery
        if: always()
        uses: ./.github/actions/notify-workflow-outcome
        with:
          workflow_id: build-hna-data
          outcome: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          github_token: ${{ github.token }}
