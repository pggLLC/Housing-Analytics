name: Build Market Data

on:
  schedule:
    # Run weekly on Sundays at 23:00 UTC (less GitHub congestion than weekday early-morning)
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh even if cache is fresh'
        required: false
        default: 'false'
      census_api_key:
        description: 'Census API key (passed by orchestrator; falls back to CENSUS_API_KEY secret)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Pre-flight validation
        run: |
          echo "── Python version ──"
          python3 --version
          echo "── Node.js version ──"
          node --version
          echo "── Disk space ──"
          df -h .
          echo "── Run context ──"
          echo "  Repository : $GITHUB_REPOSITORY"
          echo "  Run ID     : $GITHUB_RUN_ID"
          echo "── Census API key check ──"
          python3 - <<'EOF'
          import os, sys
          k = os.environ.get('CENSUS_API_KEY', '').strip()
          if k:
              print(f'  CENSUS_API_KEY: set ({len(k)} chars) ✅')
          else:
              print('::error::CENSUS_API_KEY secret is not set. '
                    'Add it in GitHub Settings → Secrets → Actions. '
                    'Get a free key at https://api.census.gov/data/key_signup.html', file=sys.stderr)
              sys.exit(1)
          EOF
        env:
          CENSUS_API_KEY: ${{ inputs.census_api_key || secrets.CENSUS_API_KEY }}

      - name: Run market data builder
        id: build
        env:
          CENSUS_API_KEY: ${{ inputs.census_api_key || secrets.CENSUS_API_KEY }}
        run: |
          echo "── Starting market data build at $(date -u) ──"
          python scripts/market/build_public_market_data.py --allow-partial
          echo "── Build completed at $(date -u) ──"
        timeout-minutes: 15

      - name: Validate artifacts and write job summary
        id: validate
        run: |
          python3 - <<'EOF'
          import json, os, sys
          from pathlib import Path

          ROOT = Path(".")
          # Colorado has ~1,300 census tracts (stable across decennial census cycles).
          # 1200 = ~92% of actual count; fewer means placeholder/corrupt data.
          MIN_TRACTS = 1200
          MIN_LIHTC  = 50    # Colorado has hundreds of LIHTC properties; fewer than 50 is placeholder data

          artifacts = [
            ("data/market/tract_centroids_co.json",  "tracts",    MIN_TRACTS),
            ("data/market/acs_tract_metrics_co.json", "tracts",   MIN_TRACTS),
            ("data/market/hud_lihtc_co.geojson",     "features",  MIN_LIHTC),
          ]
          degraded = []  # non-critical artifacts that are below threshold
          errors = []
          summary_rows = []

          for a, array_key, min_count in artifacts:
            p = ROOT / a
            if not p.exists():
              errors.append(f"Missing artifact: {a}")
              summary_rows.append(f"| `{a}` | ❌ missing | — | {min_count} |")
              continue
            size = p.stat().st_size
            if size == 0:
              errors.append(f"Zero-byte artifact: {a}")
              summary_rows.append(f"| `{a}` | ❌ empty | 0 | {min_count} |")
              continue
            try:
              obj = json.loads(p.read_text())
            except json.JSONDecodeError as e:
              errors.append(f"Invalid JSON in {a}: {e}")
              summary_rows.append(f"| `{a}` | ❌ invalid JSON | — | {min_count} |")
              continue
            records = obj.get(array_key, [])
            if not isinstance(records, list):
              errors.append(f"{a}: no '{array_key}' array")
              summary_rows.append(f"| `{a}` | ❌ schema error | — | {min_count} |")
              continue
            count = len(records)
            print(f"  {a}: {count} {array_key}")
            if count < min_count:
              # LIHTC (hud_lihtc_co.geojson) is non-core: HUD API outages are transient
              # and the build falls back to cached data.  Centroids and ACS are core and
              # must meet the threshold for the build to be considered valid.
              is_critical = "lihtc" not in a.lower()
              if is_critical:
                errors.append(
                  f"{a}: only {count} {array_key} (minimum {min_count}). "
                  f"Placeholder data detected — check Census API key and build script."
                )
                summary_rows.append(f"| `{a}` | ❌ sparse ({count}) | {size} B | {min_count} |")
              else:
                degraded.append(
                  f"{a}: only {count} {array_key} (minimum {min_count}) — "
                  f"API may be temporarily unavailable; cached data will be used."
                )
                summary_rows.append(f"| `{a}` | ⚠️ degraded ({count}) | {size} B | {min_count} |")
            else:
              summary_rows.append(f"| `{a}` | ✅ {count} records | {size} B | {min_count} |")

          # Write GitHub job summary
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_file:
            with open(summary_file, "a") as fh:
              fh.write("## Market Data Build Artifacts\n\n")
              fh.write("| File | Status | Size | Min records |\n")
              fh.write("|------|--------|------|-------------|\n")
              fh.write("\n".join(summary_rows) + "\n\n")
              if errors:
                fh.write("### ❌ Errors (critical — core data missing)\n\n")
                for e in errors:
                  fh.write(f"- {e}\n")
              if degraded:
                fh.write("### ⚠️ Degraded (non-core sources unavailable — cached data in use)\n\n")
                for d in degraded:
                  fh.write(f"- {d}\n")
              if not errors and not degraded:
                fh.write("All artifacts meet minimum data thresholds ✅\n")

          if errors:
            for e in errors:
              print(f"::error::{e}")
            sys.exit(1)
          if degraded:
            for d in degraded:
              print(f"::warning::{d}")
          print("All artifacts valid ✅")
          EOF

      - name: Alert on build failure
        if: failure()
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode failure --workflow build-market-data.yml --run-id ${context.runId} --step "Build or Validate" --details "Market data build or artifact validation failed — core data (centroids/ACS) is missing. Check Census API key and build script logs."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }
            // Also open a GitHub issue for visibility
            const title = `[Market Data] Build failed — run #${context.runId}`;
            const body = [
              `The **Build Market Data** workflow failed on run [#${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              '',
              '> **Note:** Transient API failures (TIGERweb, HUD LIHTC) are handled gracefully via',
              '> cached fallback data and `--allow-partial` mode. A build failure here means **core**',
              '> data (tract centroids or ACS metrics) could not be fetched or loaded from cache.',
              '',
              '### Common causes',
              '- `CENSUS_API_KEY` secret is missing or expired → [verify in Settings → Secrets](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/settings/secrets/actions)',
              '- Census ACS API is temporarily unavailable — re-run the workflow to retry',
              '- TIGERweb ArcGIS REST service is down for an extended period — check https://tigerweb.geo.census.gov',
              '',
              '### How to manually rebuild',
              '```bash',
              `gh workflow run build-market-data.yml --repo ${context.repo.owner}/${context.repo.repo}`,
              '```',
              '',
              'See `.github/WORKFLOW_TROUBLESHOOTING.md` for a full troubleshooting guide.',
            ].join('\n');
            const existingBuildFailureIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'market-data-build-failure',
            });
            if (existingBuildFailureIssues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['market-data-build-failure'],
              });
            }

      - name: Rebuild manifest.json
        run: |
          echo "── Regenerating data/manifest.json ──"
          python scripts/rebuild_manifest.py

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/ data/manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): rebuild market data artifacts [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
