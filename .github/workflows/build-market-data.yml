name: Build Market Data

on:
  schedule:
    # Run weekly on Mondays at 03:15 UTC
    - cron: '15 3 * * 1'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh even if cache is fresh'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Environment diagnostics
        run: |
          echo "── Python version ──"
          python3 --version
          echo "── Node.js version ──"
          node --version
          echo "── Disk space ──"
          df -h .
          echo "── Run context ──"
          echo "  Repository : $GITHUB_REPOSITORY"
          echo "  Run ID     : $GITHUB_RUN_ID"
          echo "── API key check ──"
          python3 -c "
          import os, sys
          k = os.environ.get('CENSUS_API_KEY', '').strip()
          if k:
              print(f'  CENSUS_API_KEY: set ({len(k)} chars)')
          else:
              print('  CENSUS_API_KEY: NOT SET ⚠️', file=sys.stderr)
          "
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

      - name: Run market data builder
        id: build
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          echo "── Starting market data build at $(date -u) ──"
          python scripts/market/build_public_market_data.py
          echo "── Build completed at $(date -u) ──"
        timeout-minutes: 15

      - name: Validate artifacts
        id: validate
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          ROOT = Path(".")
          artifacts = [
            "data/market/tract_centroids_co.json",
            "data/market/acs_tract_metrics_co.json",
            "data/market/hud_lihtc_co.geojson",
          ]
          errors = []
          for a in artifacts:
            p = ROOT / a
            if not p.exists():
              errors.append(f"Missing: {a}")
              continue
            size = p.stat().st_size
            print(f"  {a}: {size} bytes")
            if size == 0:
              errors.append(f"Zero-byte file: {a}")
              continue
            try:
              obj = json.loads(p.read_text())
            except json.JSONDecodeError as e:
              errors.append(f"Invalid JSON in {a}: {e}")
              continue
            if a.endswith(".geojson"):
              if not isinstance(obj.get("features"), list):
                errors.append(f"{a}: no 'features' array")
              else:
                print(f"  {a}: {len(obj['features'])} features")
            elif not isinstance(obj.get("tracts"), list):
              errors.append(f"{a}: no 'tracts' array (may be OK for empty states)")

          if errors:
            for e in errors:
              print(f"::error::{e}")
            sys.exit(1)
          print("All artifacts valid ✅")
          EOF

      - name: Alert on build failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode failure --workflow build-market-data.yml --run-id ${context.runId} --step "Build or Validate" --details "Market data build or artifact validation failed. Check Census API key and build script logs."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): rebuild market data artifacts [skip ci]"
            git push
          fi
