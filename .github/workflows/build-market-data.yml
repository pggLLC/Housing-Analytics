name: Build Market Data

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      skip_lihtc:
        description: 'Skip HUD LIHTC download (faster, uses existing geojson)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build market data artifacts
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          HUD_LIHTC_URL: ${{ secrets.HUD_LIHTC_URL }}
        run: |
          FLAGS=""
          if [ "${{ inputs.skip_lihtc }}" = "true" ]; then
            FLAGS="--skip-lihtc"
          fi
          python scripts/market/build_public_market_data.py --out-dir data/market $FLAGS

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/
          if git diff --cached --quiet; then
            echo "No changes to market data artifacts."
          else
            git commit -m "chore: refresh market data artifacts [skip ci]"
            git push
          fi
