name: Build Rent Burden Crosscheck

# F207b — CHAS reliability check cross-reference data.
# Fetches ACS B25070 (5-year 2018-2022 + 1-year 2023) for every CO
# geography we have CHAS data for, computes rates + MOE per the
# Census proportion formula, and cross-references against CHAS.
# Writes data/processed/rent_burden_crosscheck.json which drives
# js/rent-burden-reliability.js confidence scoring.
#
# Cadence: ACS 1-year releases annually in September; ACS 5-year in
# December; CHAS less often. Run yearly in mid-October to pick up the
# fresh 1-year + still have plenty of headroom before the next CHAS
# release. Also a manual workflow_dispatch trigger for ad-hoc runs.

on:
  schedule:
    - cron: '0 7 15 10 *'   # 07:00 UTC on the 15th of October
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no writes)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Sanity-check secret
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          if [ -z "${CENSUS_API_KEY}" ]; then
            echo "::error::CENSUS_API_KEY not set in repo secrets — cannot run."
            exit 1
          fi
          echo "CENSUS_API_KEY set (${#CENSUS_API_KEY} chars)"

      - name: Build crosscheck (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: node scripts/build_rent_burden_crosscheck.mjs --dry

      - name: Build crosscheck (real)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: node scripts/build_rent_burden_crosscheck.mjs

      - name: Commit + push regenerated crosscheck
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -z "$(git status --porcelain -- 'data/processed/rent_burden_crosscheck.json')" ]; then
            echo "No changes to crosscheck JSON — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'data/processed/rent_burden_crosscheck.json'
          msg=$(mktemp)
          {
            printf 'data(F207b): regenerate rent-burden crosscheck\n\n'
            printf 'CHAS 2018-2022 cross-reference vs same-vintage ACS 5-year\n'
            printf '(definitional check) + newer ACS 1-year (freshness check).\n'
            printf 'Generated by .github/workflows/build-rent-burden-crosscheck.yml.\n'
          } > "$msg"
          git commit -F "$msg"
          rm -f "$msg"
          git pull --rebase origin main || true
          git push origin HEAD:main

      - name: Summarize
        if: always()
        run: |
          echo "## Rent-burden crosscheck build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry-run: ${{ github.event.inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ACS 5-year vintage: 2018-2022 (matches CHAS — definitional check)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ACS 1-year vintage: 2023 (freshness check)" >> "$GITHUB_STEP_SUMMARY"
