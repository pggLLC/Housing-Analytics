name: Weekly Market Data Sync (Bridge + Zillow Research)

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 2:00 AM UTC
  workflow_dispatch:        # Manual trigger

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Zillow Research Data  — public bulk CSVs, no auth, no scraping
  # ──────────────────────────────────────────────────────────────────────────
  zillow-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Zillow Research bulk CSVs
        run: |
          mkdir -p data/zillow
          # ZHVI (Zillow Home Value Index) — All Homes, Metro & US
          curl -fsSL "https://files.zillowstatic.com/research/public_csvs/zhvi/Metro_zhvi_uc_sfrcondo_tier_0.33_0.67_sm_sa_month.csv" \
               -o data/zillow/zhvi_metro.csv || echo "ZHVI metro download failed"

          # ZORI (Zillow Observed Rent Index) — Metro
          curl -fsSL "https://files.zillowstatic.com/research/public_csvs/zori/Metro_zori_uc_sfrcondomfr_sm_month.csv" \
               -o data/zillow/zori_metro.csv || echo "ZORI metro download failed"

          # Median list price — Metro
          curl -fsSL "https://files.zillowstatic.com/research/public_csvs/mlp/Metro_mlp_uc_sfrcondo_sm_month.csv" \
               -o data/zillow/median_list_price_metro.csv || echo "Median list price download failed"

          # Days on market — Metro
          curl -fsSL "https://files.zillowstatic.com/research/public_csvs/days_to_close/Metro_days_to_close_uc_sfrcondo_month.csv" \
               -o data/zillow/days_to_close_metro.csv || echo "Days to close download failed"

          ls -lh data/zillow/

      - name: Convert Zillow CSVs to JSON (Colorado metros only)
        run: |
          python3 << 'PYEOF'
          import csv, json, os, glob

          CO_METROS = {
            "Denver-Aurora-Lakewood, CO",
            "Colorado Springs, CO",
            "Fort Collins, CO",
            "Boulder, CO",
            "Greeley, CO",
            "Pueblo, CO",
            "Grand Junction, CO",
          }

          out = {}
          for csvpath in glob.glob("data/zillow/*.csv"):
            key = os.path.splitext(os.path.basename(csvpath))[0]
            records = []
            try:
              with open(csvpath, newline='', encoding='utf-8-sig') as f:
                reader = csv.DictReader(f)
                for row in reader:
                  # Region column is typically "RegionName"
                  region = row.get("RegionName", "")
                  if any(m in region for m in CO_METROS):
                    records.append(row)
            except Exception as e:
              print(f"  Warning: could not parse {csvpath}: {e}")
            out[key] = records
            print(f"  {key}: {len(records)} CO metro rows")

          os.makedirs("data/market", exist_ok=True)
          with open("data/market/zillow_co_metros.json", "w") as f:
            json.dump(out, f, separators=(',', ':'))
          print("Wrote data/market/zillow_co_metros.json")
          PYEOF

      - name: Commit Zillow Research data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/zillow/ data/market/zillow_co_metros.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No Zillow Research changes to commit"
          else
            git commit -m "chore: update Zillow Research bulk data [$(date -u '+%Y-%m-%d')]"
            git pull --rebase origin main
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Bridge Public Data  — assessments & recent transactions for CO metros
  #    Uses BRIDGE_SERVER_TOKEN (GitHub Secret — never exposed client-side)
  # ──────────────────────────────────────────────────────────────────────────
  bridge-public-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run when the token secret is present
    if: ${{ vars.BRIDGE_SERVER_TOKEN != '' || secrets.BRIDGE_SERVER_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bridge public assessments (Denver metro sample)
        env:
          BRIDGE_TOKEN: ${{ secrets.BRIDGE_SERVER_TOKEN }}
        run: |
          if [ -z "$BRIDGE_TOKEN" ]; then
            echo "BRIDGE_SERVER_TOKEN secret not set — skipping Bridge fetch"
            exit 0
          fi
          mkdir -p data/market/bridge

          # Denver metro centroid: 39.7392, -104.9903 — 30-mile radius
          echo "Fetching Bridge assessments near Denver..."
          curl -fsSL \
            "https://api.bridgedataoutput.com/api/v2/pub/assessments?near=39.7392,-104.9903&nearDistance=30&limit=200&access_token=${BRIDGE_TOKEN}" \
            -o data/market/bridge/assessments_denver.json \
            || echo "Bridge assessments fetch failed"

          # Colorado Springs: 38.8339, -104.8214
          echo "Fetching Bridge assessments near Colorado Springs..."
          curl -fsSL \
            "https://api.bridgedataoutput.com/api/v2/pub/assessments?near=38.8339,-104.8214&nearDistance=20&limit=200&access_token=${BRIDGE_TOKEN}" \
            -o data/market/bridge/assessments_cos.json \
            || echo "Bridge COS assessments fetch failed"

          ls -lh data/market/bridge/

      - name: Fetch Bridge recent transactions (last 12 months)
        env:
          BRIDGE_TOKEN: ${{ secrets.BRIDGE_SERVER_TOKEN }}
        run: |
          if [ -z "$BRIDGE_TOKEN" ]; then
            exit 0
          fi
          SINCE=$(date -u -d '12 months ago' '+%Y-%m-%d' 2>/dev/null \
                  || date -u -v -12m '+%Y-%m-%d')  # macOS fallback

          echo "Fetching Bridge transactions since ${SINCE}..."
          curl -fsSL \
            "https://api.bridgedataoutput.com/api/v2/pub/transactions?near=39.7392,-104.9903&nearDistance=30&limit=200&RecordingDateFrom=${SINCE}&access_token=${BRIDGE_TOKEN}" \
            -o data/market/bridge/transactions_denver.json \
            || echo "Bridge transactions fetch failed"

          ls -lh data/market/bridge/

      - name: Commit Bridge public data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/bridge/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No Bridge data changes to commit"
          else
            git commit -m "chore: update Bridge public data [$(date -u '+%Y-%m-%d')]"
            git pull --rebase origin main
            git push
          fi
