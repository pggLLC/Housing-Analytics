name: Backfill HNA Extended ACS Cache

# Re-runnable cache job for the extended ACS profile variables used by HNA
# panels. This keeps live Census browser calls as a fallback only: cached
# summaries get home-value brackets, tenure supplements, household composition,
# occupation, labor-force, race, ethnicity, education, and income variables.
#
# Free-tier/testing-site safe: uses the existing CENSUS_API_KEY repository
# secret, commits data-only cache updates to main, and then dispatches the
# existing deploy.yml workflow only when this job actually pushed changes.

on:
  schedule:
    - cron: '35 7 1 */3 *'   # 07:35 UTC on the 1st of Jan/Apr/Jul/Oct
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no writes)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Sanity-check secret
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          if [ -z "${CENSUS_API_KEY}" ]; then
            echo "::error::CENSUS_API_KEY not set in repo secrets — cannot run."
            exit 1
          fi
          echo "CENSUS_API_KEY set (${#CENSUS_API_KEY} chars)"

      - name: Backfill extended ACS cache (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          node scripts/backfill_hna_extended_acs_cache.mjs --dry

      - name: Backfill extended ACS cache (real)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          node scripts/backfill_hna_extended_acs_cache.mjs

      - name: Verify sentinel vars
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const sample = JSON.parse(fs.readFileSync('data/hna/summary/0870195.json', 'utf8'));
          const profile = sample.acsProfile || {};
          const required = ['DP04_0083E', 'DP02_0002E', 'DP03_0027E', 'DP03_0061E', 'DP05_0037E'];
          const missing = required.filter((k) => !Object.prototype.hasOwnProperty.call(profile, k));
          if (missing.length) {
            console.error(`Missing Silt sentinel ACS vars after backfill: ${missing.join(', ')}`);
            process.exit(1);
          }
          console.log(`Verified Silt sentinel ACS vars: ${required.join(', ')}`);
          NODE

      - name: Show diff summary
        id: diff
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "── files changed ──"
          git diff --stat -- 'data/hna/summary/*.json' | tail -30 || echo "(no changes)"
          changed=$(git diff --name-only -- 'data/hna/summary/*.json' | wc -l | tr -d ' ')
          echo "changed_count=${changed}" >> "$GITHUB_OUTPUT"

      - name: Commit + push regenerated summaries
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -z "$(git status --porcelain -- 'data/hna/summary/*.json')" ]; then
            echo "Nothing to commit — every summary already had the extended ACS vars."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'data/hna/summary/*.json'
          n=$(git diff --cached --name-only | wc -l | tr -d ' ')
          msg=$(mktemp)
          {
            printf 'data(hna): backfill extended ACS cache vars into %s summary files

' "$n"
            printf 'Populates extended ACS profile variables used by HNA panels for
'
            printf 'home values, tenure, household composition, occupation, labor
'
            printf 'force, race, ethnicity, education, and income. Live Census
'
            printf 'requests remain a fallback instead of the primary render path.

'
            printf 'Generated by .github/workflows/backfill-hna-extended-acs-cache.yml.
'
          } > "$msg"
          git commit -F "$msg"
          rm -f "$msg"
          git pull --rebase origin main || true
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: ${{ github.event.inputs.dry_run != 'true' && steps.commit.outputs.pushed == 'true' }}
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });

      - name: Summarize
        if: always()
        run: |
          echo "## Backfill Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry-run: ${{ github.event.inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Changed summaries: ${{ steps.diff.outputs.changed_count || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pushed data commit: ${{ steps.commit.outputs.pushed || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- See the run logs for per-file filled / skipped / errored counts." >> "$GITHUB_STEP_SUMMARY"
