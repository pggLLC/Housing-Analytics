name: Console Error Audit

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: read
  issues:   write

jobs:
  console-error-audit:
    name: Audit Console Errors Across All Pages
    runs-on: ubuntu-latest

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── Start static server ─────────────────────────────────────────────────
      - name: Start static server
        run: node scripts/audit/serve-static.mjs &
        env:
          PORT: 8080
          HOST: 127.0.0.1

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/ > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
          echo "ERROR: Server did not become ready within 30 seconds" >&2
          exit 1

      # ── Run console error reporter ──────────────────────────────────────────
      - name: Run console error reporter
        id: audit
        run: |
          node scripts/audit/console-error-reporter.mjs
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
        env:
          AUDIT_BASE_URL: http://127.0.0.1:8080
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── Upload reports ──────────────────────────────────────────────────────
      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: console-error-report-${{ github.run_number }}
          path: audit-report/console/
          retention-days: 90

      # ── Report to repo owner via GitHub Issue ───────────────────────────────
      - name: Read report and file GitHub Issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            // Load latest reports produced by the audit step
            const reportDir  = path.join(process.cwd(), 'audit-report', 'console');
            const jsonPath   = path.join(reportDir, 'latest-console-report.json');
            const mdPath     = path.join(reportDir, 'latest-console-report.md');

            if (!fs.existsSync(jsonPath)) {
              console.log('No report file found — audit may have failed to start.');
              return;
            }

            const report  = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            const mdBody  = fs.existsSync(mdPath) ? fs.readFileSync(mdPath, 'utf8') : '_No markdown report available._';
            const summary = report.summary || {};

            const totalErrors   = summary.totalErrors   || 0;
            const totalWarnings = summary.totalWarnings || 0;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const statusEmoji = totalErrors > 0 ? '🔴' : (totalWarnings > 0 ? '🟡' : '🟢');
            const issueTitle  = `[Console Audit] ${statusEmoji} ${totalErrors} error(s), ${totalWarnings} warning(s) — ${new Date().toISOString().slice(0,10)}`;

            // Truncate body to stay within GitHub's 65536-char issue limit
            const MAX_BODY = 60000;
            const body = mdBody.length > MAX_BODY
              ? mdBody.slice(0, MAX_BODY) + '\n\n_...truncated. See workflow artifact for full report._'
              : mdBody;

            const LABEL = 'console-audit';

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  LABEL,
              });
            } catch (_) {
              await github.rest.issues.createLabel({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                name:        LABEL,
                color:       'b45309',
                description: 'Automated console error audit findings',
              });
            }

            // Search for an existing open issue from this audit
            const existingIssues = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: LABEL,
              per_page: 10,
            });

            const existing = existingIssues.data.find(i =>
              i.title.startsWith('[Console Audit]')
            );

            if (existing) {
              // Update the existing issue with a comment
              console.log(`Updating existing issue #${existing.number}`);
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing.number,
                body: `## Re-run: ${new Date().toISOString()}\n\n${body}\n\n[View workflow run](${runUrl})`,
              });

              // If clean, close the issue
              if (totalErrors === 0 && totalWarnings === 0) {
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: existing.number,
                  state:        'closed',
                  state_reason: 'completed',
                });
                console.log('All clean — closed existing issue.');
              }
            } else if (totalErrors > 0 || totalWarnings > 0) {
              // Create a new issue only if there are findings
              console.log('Creating new console-audit issue.');
              const created = await github.rest.issues.create({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                title:    issueTitle,
                body:     body + `\n\n[View workflow run](${runUrl})`,
                labels:   [LABEL],
                assignees: ['paulglasow'],
              });
              console.log(`Created issue #${created.data.number}: ${created.data.html_url}`);
            } else {
              console.log('Audit is clean — no issue created.');
            }
