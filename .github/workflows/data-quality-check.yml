name: Data Quality Check

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:         # Allow manual triggering

permissions:
  contents: read
  issues: write

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate critical data files
        id: validate
        run: node scripts/validate-critical-data.js

      - name: Check county boundaries feature count
        id: county-check
        shell: bash
        run: |
          set -e
          FEATURES=$(python3 -c "
          import json, sys
          try:
              with open('data/co-county-boundaries.json') as f:
                  d = json.load(f)
              count = len(d.get('features', []))
              print(count)
          except Exception as e:
              print(0)
              sys.exit(1)
          ")
          echo "county_features=$FEATURES" >> "$GITHUB_OUTPUT"
          if [ "$FEATURES" -lt 60 ]; then
            echo "::error::County boundaries file has only $FEATURES features (expected >= 60)"
            exit 1
          fi
          echo "✅ County boundaries: $FEATURES features"

      - name: Check FRED series observations
        id: fred-check
        shell: bash
        run: |
          set -e
          python3 - << 'EOF'
          import json, sys

          try:
              with open('data/fred-data.json') as f:
                  d = json.load(f)
          except Exception as e:
              print(f"::error::Cannot read data/fred-data.json: {e}")
              sys.exit(1)

          series = d.get('series', {})
          if not series:
              print("::error::data/fred-data.json has no 'series' key or it is empty")
              sys.exit(1)

          # Normalise to a list of (name, observations) tuples for both dict/list formats
          if isinstance(series, dict):
              items = [(k, v.get('observations', [])) for k, v in series.items()]
          else:
              items = [(s.get('name', str(i)), s.get('observations', [])) for i, s in enumerate(series)]

          empty_names = [name for name, obs in items if not obs]
          total = len(items)

          if empty_names:
              print(f"::warning::FRED series with 0 observations: {', '.join(empty_names[:10])}")

          if len(empty_names) == total:
              print("::error::ALL FRED series have 0 observations")
              sys.exit(1)

          print(f"✅ FRED data: {total} series, {len(empty_names)} with 0 observations")
          EOF

      - name: Check CHFA-LIHTC data
        shell: bash
        run: |
          set -e
          python3 -c "
          import json, sys
          with open('data/chfa-lihtc.json') as f:
              d = json.load(f)
          features = len(d.get('features', []))
          if features < 1:
              print('::error::data/chfa-lihtc.json has no features')
              sys.exit(1)
          print(f'✅ CHFA-LIHTC: {features} features')
          "

      - name: Check CHFA Affordable Housing data
        shell: bash
        run: |
          python3 -c "
          import json, sys
          try:
              with open('data/chfa-affordable-housing.json') as f:
                  d = json.load(f)
              features = len(d.get('features', []))
              if features < 1000:
                  print(f'::warning::CHFA Affordable Housing has only {features} features (expected ~1688)')
              else:
                  print(f'✅ CHFA Affordable Housing: {features} features')
          except FileNotFoundError:
              print('::warning::data/chfa-affordable-housing.json not found')
          except Exception as e:
              print(f'::warning::CHFA Affordable Housing check failed: {e}')
          "

      - name: Check AMI gap data
        shell: bash
        run: |
          python3 -c "
          import json, sys
          try:
              with open('data/co_ami_gap_by_county.json') as f:
                  d = json.load(f)
              counties = d.get('counties', {})
              count = len(counties) if isinstance(counties, dict) else 0
              if count < 64:
                  print(f'::warning::AMI gap data has {count}/64 counties')
              else:
                  print(f'✅ AMI gap: {count} counties')
          except Exception as e:
              print(f'::warning::AMI gap data check failed: {e}')
          " || true

      - name: Check policy briefs and alerts freshness
        shell: bash
        run: |
          python3 - << 'EOF'
          import json, sys
          from datetime import datetime, timedelta, timezone

          now = datetime.now(timezone.utc)
          stale_days = 14  # Briefs older than 14 days warrant a warning

          # Check alerts archive
          try:
              with open('data/alerts/alerts_archive.json') as f:
                  d = json.load(f)
              alerts = d.get('alerts', [])
              gen = d.get('meta', {}).get('generated', '')
              count = len(alerts)
              if count == 0:
                  print('::warning::Alerts archive is empty — run fetch_google_alerts.py')
              else:
                  print(f'✅ Alerts archive: {count} alerts')
              if gen:
                  gen_dt = datetime.fromisoformat(gen.replace('Z', '+00:00'))
                  age = (now - gen_dt).days
                  if age > stale_days:
                      print(f'::warning::Alerts archive is {age} days old (generated {gen[:10]})')
          except FileNotFoundError:
              print('::warning::data/alerts/alerts_archive.json not found')
          except Exception as e:
              print(f'::warning::Alerts archive check failed: {e}')

          # Check policy briefs
          try:
              with open('data/policy_briefs.json') as f:
                  d = json.load(f)
              briefs = d.get('briefs', [])
              gen = d.get('meta', {}).get('generated', '')
              count = len(briefs)
              if count == 0:
                  print('::warning::Policy briefs file has 0 briefs — run generate_policy_briefs.py')
              else:
                  print(f'✅ Policy briefs: {count} briefs')
              if gen:
                  gen_dt = datetime.fromisoformat(gen.replace('Z', '+00:00'))
                  age = (now - gen_dt).days
                  if age > stale_days:
                      print(f'::warning::Policy briefs are {age} days old (generated {gen[:10]})')
          except FileNotFoundError:
              print('::warning::data/policy_briefs.json not found')
          except Exception as e:
              print(f'::warning::Policy briefs check failed: {e}')

          # Check insights verification date
          try:
              with open('data/insights-meta.json') as f:
                  d = json.load(f)
              verified = d.get('lastVerified', '')
              if verified:
                  v_dt = datetime.fromisoformat(verified)
                  age = (now.date() - v_dt.date()).days
                  if age > 30:
                      print(f'::warning::Insights verification is {age} days old ({verified}) — review recommended')
                  else:
                      print(f'✅ Insights verified: {verified} ({age} days ago)')
          except Exception as e:
              print(f'::warning::Insights meta check failed: {e}')
          EOF

      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `[Data Quality] Validation failed ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '## ⚠️ Data Quality Check Failed',
              '',
              `**Run:** ${context.runId}`,
              `**Triggered at:** ${new Date().toUTCString()}`,
              `**Workflow:** [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '### What to check',
              '- [ ] `data/co-county-boundaries.json` — should have 64 features',
              '- [ ] `data/fred-data.json` — FRED series should have observations',
              '- [ ] `data/chfa-lihtc.json` — should have ~716 LIHTC features',
              '- [ ] `data/chfa-affordable-housing.json` — should have ~1688 affordable housing features',
              '- [ ] `data/policy_briefs.json` — should have recent briefs (run `generate_policy_briefs.py`)',
              '- [ ] `data/alerts/alerts_archive.json` — should have recent alerts (run `fetch_google_alerts.py`)',
              '',
              '### Next steps',
              '1. Review the failed step logs linked above.',
              '2. Run the relevant data-refresh workflow (`data-refresh.yml`, `fetch-fred-data.yml`, etc.).',
              '3. Re-run this workflow to confirm the fix.',
            ].join('\n');

            // Check for existing open issue to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-quality',
            });

            const existing = issues.find(i => i.title.startsWith('[Data Quality]'));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `🔁 Data quality check failed again at ${new Date().toUTCString()}.\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['data-quality'],
              });
            }
