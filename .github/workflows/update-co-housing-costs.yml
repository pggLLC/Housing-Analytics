name: Update CO Housing Costs Data

on:
  schedule:
    - cron: '15 10 2 * *'   # 2nd of each month at 10:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-co-housing-costs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas \
            pyarrow \
            geopandas \
            folium \
            matplotlib \
            scikit-learn \
            openpyxl \
            requests

      - name: Run pipeline
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          ZILLOW_DATA_PATH: ${{ secrets.ZILLOW_DATA_PATH }}
        run: |
          python scripts/build_co_housing_costs_insight.py --refresh

      - name: Commit and push generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/co-housing-costs/ \
            assets/co-housing-costs/ \
            || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update CO housing costs data and maps [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
