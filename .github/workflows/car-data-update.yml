name: CAR Data Update

on:
  schedule:
    - cron: '0 4 1 * *'   # Monthly — 1st of each month at 04:00 UTC
  workflow_dispatch:        # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate CAR placeholder data for current month
        run: node scripts/generate-car-placeholder.mjs

      - name: Commit and push data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/car-market-report-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit — CAR data is already up to date."
          else
            git commit -m "chore: update CAR market report placeholder [$(date -u '+%Y-%m')]"
            git pull --rebase --autostash origin main
            git push
          fi
