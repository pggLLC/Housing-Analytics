name: Site-Wide WCAG Contrast Audit

on:
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 2 AM UTC
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  contrast-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Environment diagnostics
        run: |
          echo "── Node.js version ──"
          node --version
          echo "── npm version ──"
          npm --version
          echo "── Run context ──"
          echo "  Repository : $GITHUB_REPOSITORY"
          echo "  Run ID     : $GITHUB_RUN_ID"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Discover HTML pages
        id: discover
        run: |
          pages=$(find . -maxdepth 1 -name "*.html" -not -path "./.git/*" | sort | sed 's|^\./||')
          echo "Found HTML pages:"
          echo "$pages"
          # Store as newline-delimited list in an env file
          echo "PAGES<<EOF" >> "$GITHUB_ENV"
          echo "$pages" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          count=$(echo "$pages" | grep -c '\.html' || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Start local HTTP server
        run: npx http-server . -p 8080 --silent &
        env:
          CONTRAST_BASE_URL: http://localhost:8080

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Run Stage 3 WCAG Accessibility Gate (46 checks)
        id: wcag-gate
        run: |
          pip install pytest --quiet
          pytest tests/test_stage3_accessibility.py -v --tb=short \
            2>&1 | tee wcag-test-output.txt
          
          # Extract final score from pytest output
          SCORE=$(grep -o "WCAG COMPLIANCE SCORE: [0-9]*%" wcag-test-output.txt | tail -1)
          if [ -z "$SCORE" ]; then
            SCORE="UNKNOWN"
          fi
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          
          # Count passed/failed
          PASSED=$(grep -o "passed" wcag-test-output.txt | wc -l)
          FAILED=$(grep -o "failed" wcag-test-output.txt | wc -l)
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Run contrast audit on each page
        id: audit
        run: |
          mkdir -p contrast-reports
          summary_file="contrast-reports/summary.md"
          total=0
          passed=0
          failed=0

          echo "# WCAG Contrast Audit Report" > "$summary_file"
          echo "" >> "$summary_file"
          echo "Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$summary_file"
          echo "" >> "$summary_file"
          echo "## WCAG Accessibility Gate (Stage 3)" >> "$summary_file"
          echo "" >> "$summary_file"
          echo "- **WCAG Compliance Score:** ${{ steps.wcag-gate.outputs.score }}" >> "$summary_file"
          echo "- **Pytest Status:** ${{ steps.wcag-gate.outcome }}" >> "$summary_file"
          echo "" >> "$summary_file"
          echo "## Contrast Audit Results" >> "$summary_file"
          echo "" >> "$summary_file"
          echo "| Page | Status | Issues |" >> "$summary_file"
          echo "|------|--------|--------|" >> "$summary_file"

          while IFS= read -r page; do
            [ -z "$page" ] && continue
            total=$((total + 1))
            page_name="${page%.html}"
            report_file="contrast-reports/${page_name//\//-}.json"

            echo "Auditing: $page"

            # Run the Playwright-based contrast audit for this page.
            # CONTRAST_FIX=1 applies fixes in-browser and records before/after ratios.
            # CONTRAST_REPORT_FILE writes the JSON report; exit code reflects pass/fail.
            if CONTRAST_BASE_URL="http://localhost:8080" \
               CONTRAST_PAGE="$page" \
               CONTRAST_FIX=1 \
               CONTRAST_REPORT_FILE="$report_file" \
               node scripts/contrast-audit/run.js; then
              status="✅ Pass"
              passed=$((passed + 1))
              issues=0
            else
              status="❌ Fail"
              failed=$((failed + 1))
              issues=$(jq '.summary.violations // 0' "$report_file" 2>/dev/null || echo "?")
            fi

            echo "| \`$page\` | $status | $issues |" >> "$summary_file"
          done <<< "$PAGES"

          echo "" >> "$summary_file"
          echo "## Summary" >> "$summary_file"
          echo "" >> "$summary_file"
          echo "- **Total pages audited:** $total" >> "$summary_file"
          echo "- **Passed:** $passed" >> "$summary_file"
          echo "- **Failed:** $failed" >> "$summary_file"

          cat "$summary_file"

          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

      - name: Validate accessibility compliance
        if: failure()
        run: |
          echo "❌ WCAG Accessibility Gate FAILED"
          echo "   Pytest tests did not achieve 100% compliance."
          echo "   Review wcag-test-output.txt and contrast-reports/summary.md"
          exit 1

      - name: Upload audit reports and test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-audit-results
          path: |
            contrast-reports/
            wcag-test-output.txt
          retention-days: 30

      - name: Comment on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'contrast-reports/summary.md';
            const wcagOutputPath = 'wcag-test-output.txt';

            let body = '## ✅ WCAG 2.1 AA Accessibility & Contrast Audit\n\n';

            // Include WCAG test results summary
            if (fs.existsSync(wcagOutputPath)) {
              const wcagOutput = fs.readFileSync(wcagOutputPath, 'utf8');
              const scoreMatch = wcagOutput.match(/WCAG COMPLIANCE SCORE: (\d+%)/);
              const testMatch = wcagOutput.match(/(\d+) passed/);

              body += '### 🎯 WCAG Compliance Gate\n';
              body += scoreMatch ? `- **Compliance Score:** ${scoreMatch[1]}\n` : '- **Compliance Score:** Unknown\n';
              body += testMatch ? `- **Tests Passed:** ${testMatch[1]}/46\n` : '- **Tests Passed:** Unknown\n';
              body += '\n';
            }

            body += '### 📊 Contrast Audit Results\n\n';
            if (fs.existsSync(summaryPath)) {
              body += fs.readFileSync(summaryPath, 'utf8');
            } else {
              body += '_No summary report generated._';
            }

            body += '\n\n_Audit run on commit ' + context.sha.slice(0, 7) + '_';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Alert on audit failure
        if: failure()
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            let failureDetails = 'WCAG accessibility audit failed.';

            // Check if it's a pytest failure or contrast failure
            if (fs.existsSync('wcag-test-output.txt')) {
              failureDetails = 'WCAG Stage 3 pytest gate failed. Review test results.';
            } else if (fs.existsSync('contrast-reports/summary.md')) {
              failureDetails = 'Contrast audit detected violations. Review contrast reports.';
            }

            try {
              execSync(
                `node scripts/monitoring/alert.js --mode failure --workflow contrast-audit.yml --run-id ${context.runId} --step "WCAG Accessibility & Contrast Audit" --details "${failureDetails}"`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }
