name: Backfill HNA Household / Occupation / Labor Force

# One-off (re-runnable) job that fills the F169 ACS variables into every
# cached data/hna/summary/*.json file's acsProfile object so the new
# "Household composition, occupation & labor force" panel populates on
# the public site without waiting for a full cache rebuild.
#
# Fills 17 DP02 / DP03 variables:
#   DP02_0014E, DP02_0016E                 — avg family + household size
#   DP02_0034E – DP02_0040E                — household-size distribution
#   DP03_0027E – DP03_0031E                — top-level OCC buckets
#   DP03_0002E, DP03_0005E, DP03_0007E     — labor-force status
#
# Skips files that already have DP02_0014E (cheap idempotency check), so
# re-running after the first pass only touches new summaries.
#
# Triggered manually via Actions → "Backfill HNA Household / Occupation /
# Labor Force" → Run workflow. Also fires on a quarterly cron in case new
# summary files land between manual runs.

on:
  schedule:
    - cron: '15 7 1 */3 *'   # 07:15 UTC on the 1st of Jan/Apr/Jul/Oct
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no writes)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Sanity-check secret
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          if [ -z "${CENSUS_API_KEY}" ]; then
            echo "::error::CENSUS_API_KEY not set in repo secrets — cannot run."
            exit 1
          fi
          echo "CENSUS_API_KEY set (${#CENSUS_API_KEY} chars)"

      - name: Backfill (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          node scripts/backfill_hna_household_occupation.mjs --dry

      - name: Backfill (real)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          node scripts/backfill_hna_household_occupation.mjs

      - name: Show diff summary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "── files changed ──"
          git diff --stat -- 'data/hna/summary/*.json' | tail -30 || echo "(no changes)"
          changed=$(git diff --name-only -- 'data/hna/summary/*.json' | wc -l | tr -d ' ')
          echo "changed_count=${changed}" >> "$GITHUB_OUTPUT"

      - name: Commit + push regenerated summaries
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -z "$(git status --porcelain -- 'data/hna/summary/*.json')" ]; then
            echo "Nothing to commit — every summary already had the F169 vars."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'data/hna/summary/*.json'
          n=$(git diff --cached --name-only | wc -l | tr -d ' ')
          msg=$(mktemp)
          {
            printf 'data(F169): backfill DP02/DP03 household + occupation vars into %s HNA summary files\n\n' "$n"
            printf 'Populates 17 ACS variables (avg family/household size,\n'
            printf 'household-size distribution, top-level OCC buckets, labor-force\n'
            printf 'status) into every cached data/hna/summary/*.json acsProfile.\n'
            printf 'Unblocks the new HNA "Household composition, occupation & labor\n'
            printf 'force" panel for cached jurisdictions without waiting for the\n'
            printf 'next full HNA cache rebuild.\n\n'
            printf 'Idempotent — already-backfilled summaries are skipped.\n\n'
            printf 'Generated by .github/workflows/backfill-hna-household-occupation.yml.\n'
          } > "$msg"
          git commit -F "$msg"
          rm -f "$msg"
          git pull --rebase origin main || true
          git push origin HEAD:main

      - name: Summarize
        if: always()
        run: |
          echo "## Backfill Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry-run: ${{ github.event.inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- See the run logs for per-file filled / skipped / errored counts." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$(git log -1 --oneline 2>/dev/null | grep 'F169')" ]; then
            echo "- Committed: $(git log -1 --oneline)" >> "$GITHUB_STEP_SUMMARY"
          fi
