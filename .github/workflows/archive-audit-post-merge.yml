name: Archive, Audit, & Docs Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run audit/archive/docs automation
        run: node scripts/sync-docs.mjs

      - name: Commit and push updated, quarantined, and docs files
        run: |
          git config --global user.email "copilot-agent@github.com"
          git config --global user.name "Copilot Agent"
          git add .
          git commit -m "Automated quarantine, audit, and documentation after merge" || echo "Nothing to commit"
          git push || echo "Nothing to commit"
