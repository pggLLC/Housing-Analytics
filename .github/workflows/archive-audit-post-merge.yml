name: Archive, Audit, & Docs Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  audit-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run audit/archive/docs automation
        run: node scripts/sync-docs.mjs

      - name: Commit and push updated, quarantined, and docs files
        id: commit_docs
        run: |
          set -euo pipefail
          git config --global user.email "copilot-agent@github.com"
          git config --global user.name "Copilot Agent"
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Automated quarantine, audit, and documentation after merge"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push automation commit after 3 attempts"
              exit 1
            fi
            sleep 2
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch Pages deploy for automation commit
        if: steps.commit_docs.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Commits pushed by the workflow token do not reliably trigger
          # push-based workflows. Explicitly dispatch Pages so the public
          # artifact is rebuilt for the automation commit that just became
          # main's HEAD.
          gh workflow run deploy.yml --ref main
