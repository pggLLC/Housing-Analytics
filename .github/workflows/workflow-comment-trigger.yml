name: Workflow Comment Trigger

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  rebuild-market-data:
    # React to the exact trigger phrase from repository collaborators/members/owners,
    # or from the chatgpt-codex-connector[bot] account.
    if: |
      contains(github.event.comment.body, '@github-actions rebuild-market-data') &&
      (
        contains(fromJSON('["MEMBER", "COLLABORATOR", "OWNER"]'), github.event.comment.author_association) ||
        github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge trigger
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `👷 Rebuilding market data — triggered by @${context.actor}.`,
                '',
                `Workflow dispatch: [Build Market Data](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/build-market-data.yml)`,
                '',
                '_This comment was posted automatically. The build typically takes 10–15 minutes._',
              ].join('\n'),
            });

      - name: Dispatch build-market-data workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh workflow run build-market-data.yml --repo "$REPO" --ref main
          echo "build-market-data.yml dispatched ✅"

      - name: Notify on dispatch failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `⚠️ **Workflow dispatch failed** for \`build-market-data.yml\`.`,
                '',
                `Triggered by: @${context.actor}`,
                `Run: [Workflow Comment Trigger #${context.runNumber}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                'Please check that the `GITHUB_TOKEN` has `actions: write` permission and that `build-market-data.yml` exists on the `main` branch. A repository owner can also trigger the build manually from the [Actions tab](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/workflows/build-market-data.yml).',
              ].join('\n'),
            });
