name: "Issue Portfolio Triage (one-time)"

# Manually triggered to process the 6 open-issue resolution plan.
# Run once after merging this PR. Steps are idempotent where possible.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print actions without posting to GitHub (true/false)'
        required: false
        default: 'false'

permissions:
  issues: write

jobs:
  triage:
    name: Triage Open Issues
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: pggLLC/Housing-Analytics
      DRY_RUN: ${{ github.event.inputs.dry_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 1: Close #516 (stale CI-incident issue) ──────────────────────
      - name: Close #516 — stale market-data-build-failure incident
        run: |
          BODY='## Resolved: Historical CI Incident

          **Root cause:** Workflow run [#24019124215](https://github.com/pggLLC/Housing-Analytics/actions/runs/24019124215) failed on 2026-04-06 because the health-check bash script echoed multi-line ANSI output into `$GITHUB_OUTPUT`, triggering: `Unable to process file command '\''output'\'' successfully. Invalid format '\''true'\''`.

          **Resolution:** This incident is now closed. Subsequent `market_data_build.yml` runs are green:
          - Run #40 (2026-04-13) → **success** ✅
          - Run #39 (2026-04-13) → **success** ✅
          - Run #38 (2026-04-12) → **success** ✅

          The health-check output-handling was patched in a later commit. No active build failures exist.

          > **Reopen this issue only if the workflow auto-opens a new `market-data-build-failure` issue.** The deduplication logic in `market_data_build.yml` ensures at most one open incident issue exists at a time.

          _Closed by automated triage — 2026-04-15_'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would comment on #516 and close it"
            echo "$BODY"
          else
            gh issue comment 516 --repo "$REPO" --body "$BODY"
            gh issue close 516 --repo "$REPO" --reason "not planned"
            echo "✅ Closed #516"
          fi

      # ── Step 2: Close #577 (duplicate tracker) ────────────────────────────
      - name: Close #577 — duplicate Phase 3 tracker
        run: |
          BODY='## Duplicate of #578

          This tracker was created the same day as [#578 — Phase 3 Post-Merge Completion Tracking](https://github.com/pggLLC/Housing-Analytics/issues/578) and covers identical scope. All checklist items from this issue have been migrated to #578, which is the canonical Phase 3 completion board.

          Notable items now tracked in #578 sub-issues:
          - **Auto-generate API docs** → tracked as child of epic #446
          - **Expand integration/smoke tests** → tracked as child of epic #446
          - **Data freshness monitoring + Slack alerts** → tracked as child of epic #447
          - **Multi-county aggregation view** → roadmap item in #578
          - **Parcel/zoning layer integration** → roadmap item in #578
          - **Comparable rent roll benchmarking** → roadmap item in #578
          - **Historical trend charts** → roadmap item in #578

          The references to PR #576 are also resolved — that PR was merged on 2026-04-13.

          Closing as duplicate. Please track Phase 3 progress in **#578**.

          _Closed by automated triage — 2026-04-15_'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would comment on #577 and close it as duplicate"
            echo "$BODY"
          else
            gh issue comment 577 --repo "$REPO" --body "$BODY"
            gh issue close 577 --repo "$REPO" --reason "duplicate"
            echo "✅ Closed #577"
          fi

      # ── Step 3: Post QA verification on #550 and close it ─────────────────
      - name: Post QA results on #550 and close
        run: |
          BODY='## QA/QC Verification — Post-Merge Results (2026-04-15)

          Automated code-level verification against `main` (PR #549 merged 2026-04-11):

          ### ✅ CHAS chart — Denver cost-burden data
          - `data/hna/chas_affordability_gap.json`: 64 counties present ✅
          - Denver (FIPS `08031`): 159,464 total renters, 34,805 cost-burdened → **21.8% cost-burdened** ✅ (matches PR notes exactly)

          ### ✅ Source badges do not overflow chart containers
          - `js/components/source-badge.js` line 42: badges appended to `.chart-card`, not inside fixed-height `.chart-box` ✅

          ### ✅ NHPD properties wired for competitive set
          - `js/market-analysis.js` lines 2296–2305: `nhpd_co.geojson` fetched in `loadData()` and loaded into the Nhpd connector ✅

          ### ✅ Pro forma table populates from deal calculator inputs
          - `test/pro-forma.test.js`: **24 / 24 passed** ✅
          - Pro forma reads `deal-calc:updated` CustomEvent and re-renders table and chart ✅

          ### ✅ QAP simulator sliders recalculate scores
          - `test/qap-simulator.test.js`: **64 / 64 passed** ✅
          - Real-time recalculation, benchmark comparison, and gauge update all verified ✅

          ### ✅ Scenario toggle switches between 10/20-year horizon
          - `housing-needs-assessment.html` lines 535–537: toggle buttons present with correct `data-horizon` values ✅
          - `js/hna/hna-renderers.js` line 1990: reads active button `data-horizon` on every render ✅

          ### ✅ All CI checks pass
          - CI Checks run #1270 (2026-04-13): **success** ✅
          - `npm run test:ci`: 28 / 28 validations passed ✅

          ---
          **All 7 checklist items verified.** Closing this QA gate issue as fully resolved.

          _Closed by automated triage — 2026-04-15_'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would comment on #550 and close it"
            echo "$BODY"
          else
            gh issue comment 550 --repo "$REPO" --body "$BODY"
            gh issue close 550 --repo "$REPO" --reason "completed"
            echo "✅ Closed #550"
          fi

      # ── Step 4: Create child sub-issues for epic #446 ─────────────────────
      - name: Create sub-issue #446-A — Auto-generate API docs with JSDoc
        id: sub_446_a
        run: |
          BODY='## Auto-Generate API Documentation with JSDoc

          **Parent epic:** #446 — Documentation, Testing, and Implementation Guidance

          ### Objective
          Run JSDoc over all Phase 3 JS modules and publish generated docs to `docs/api/`.

          ### Scope
          Modules to document:
          - `js/pro-forma.js`
          - `js/qap-simulator.js`
          - `js/legislative-tracker.js`
          - `js/lihtc-deal-predictor.js`
          - `js/hna/hna-controller.js`, `hna-renderers.js`, `hna-utils.js`

          ### Acceptance Criteria
          - [ ] JSDoc block comments added to all public functions in scoped modules
          - [ ] `jsdoc` added to `devDependencies` in `package.json`
          - [ ] `npm run docs:generate` produces `docs/api/` directory
          - [ ] `.github/workflows/docs-sync.yml` triggers doc generation on push to `main`
          - [ ] Generated docs browseable at `docs/api/index.html`

          **Effort:** Medium (~2 days)'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would create sub-issue for #446 (API docs)"
            echo "SUB_446_A_NUM=DRY-RUN" >> "$GITHUB_OUTPUT"
          else
            NUM=$(gh issue create \
              --repo "$REPO" \
              --title "docs: auto-generate API documentation with JSDoc [#446 child]" \
              --body "$BODY" \
              --label "enhancement" \
              --assignee paulglasow \
              | grep -o '[0-9]*$')
            echo "SUB_446_A_NUM=$NUM" >> "$GITHUB_OUTPUT"
            echo "✅ Created sub-issue #$NUM (API docs)"
          fi

      - name: Create sub-issue #446-B — CI test coverage reporting
        id: sub_446_b
        run: |
          BODY='## Add CI Test Coverage Reporting

          **Parent epic:** #446 — Documentation, Testing, and Implementation Guidance

          ### Objective
          Surface per-test-file pass/fail counts in CI workflow summary so coverage trends are visible without an external service.

          ### Acceptance Criteria
          - [ ] `ci-checks.yml` generates a GitHub Actions workflow summary table with pass/fail per test file
          - [ ] Summary covers all test scripts: `validate.js`, `validate-critical-data.js`, `test/fetch-helper-resolve.js`, `test/hna-functionality-check.js`, `test/validate-site.js`, `test/pro-forma.test.js`, `test/qap-simulator.test.js`
          - [ ] A "trend" badge (total tests passing) is written to `docs/test-coverage-badge.json` and committed back to `main` on each CI run

          **Effort:** Small (~0.5 days)'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would create sub-issue for #446 (CI coverage)"
            echo "SUB_446_B_NUM=DRY-RUN" >> "$GITHUB_OUTPUT"
          else
            NUM=$(gh issue create \
              --repo "$REPO" \
              --title "ci: add test coverage reporting to CI workflow summary [#446 child]" \
              --body "$BODY" \
              --label "enhancement" \
              --assignee paulglasow \
              | grep -o '[0-9]*$')
            echo "SUB_446_B_NUM=$NUM" >> "$GITHUB_OUTPUT"
            echo "✅ Created sub-issue #$NUM (CI coverage)"
          fi

      # ── Step 5: Create child sub-issues for epic #447 ─────────────────────
      - name: Create sub-issue #447-A — ETL validation hardening
        id: sub_447_a
        run: |
          BODY='## ETL Validation Hardening — Fail Loudly on Required Field Nulls

          **Parent epic:** #447 — Data Quality, Monitoring & Infrastructure Enhancements

          ### Objective
          Ensure all ETL and data-fetch scripts exit non-zero when required fields are null or missing, preventing silent data corruption from reaching production.

          ### Acceptance Criteria
          - [ ] `scripts/market/build_public_market_data.py` exits non-zero on null `ami_4person`, `LI_UNITS`, or `N_UNITS` (Governance Rule 2)
          - [ ] `fetch-fred-data.yml` / fetch script exits non-zero when any series ships with zero observations (Governance Rule 7 — max gap 35 days)
          - [ ] CAR data fetch exits non-zero on null statewide required fields (Governance Rule 8)
          - [ ] `scripts/validate-schemas.js` catches FIPS codes that are not 5-digit strings (Governance Rule 1)
          - [ ] `pytest tests/test_governance_stress.py` passes with no new failures
          - [ ] Re-investigation of `data/fred-data.json` size (currently 952 KB vs expected ≥1.7 MB) — confirm series count and re-trigger fetch if needed

          **Effort:** Medium (~1–2 days)'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would create sub-issue for #447 (ETL validation)"
            echo "SUB_447_A_NUM=DRY-RUN" >> "$GITHUB_OUTPUT"
          else
            NUM=$(gh issue create \
              --repo "$REPO" \
              --title "data: ETL validation hardening — fail loudly on required field nulls [#447 child]" \
              --body "$BODY" \
              --label "enhancement" \
              --assignee paulglasow \
              | grep -o '[0-9]*$')
            echo "SUB_447_A_NUM=$NUM" >> "$GITHUB_OUTPUT"
            echo "✅ Created sub-issue #$NUM (ETL validation)"
          fi

      - name: Create sub-issue #447-B — Real-time data health indicators in UI
        id: sub_447_b
        run: |
          BODY='## Real-Time Data Health Indicators in UI

          **Parent epic:** #447 — Data Quality, Monitoring & Infrastructure Enhancements

          ### Objective
          Show live data freshness badges on every dashboard page sourced from `data/manifest.json`, so users know when data was last updated and are warned about stale data.

          ### Acceptance Criteria
          - [ ] Each dashboard page shows a "Data as of [date]" indicator in the footer or sidebar, populated from `data/manifest.json`
          - [ ] Stale data (>30 days old) displays a visible warning icon
          - [ ] Indicator is WCAG 2.1 AA compliant (accessible label, sufficient contrast)
          - [ ] `data/manifest.json` `generated` timestamp is verified to be <30 days old as part of CI
          - [ ] `js/data-freshness.js` or `js/data-status-footer.js` implements the indicator logic

          **Effort:** Small (~0.5 days)'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would create sub-issue for #447 (health indicators)"
            echo "SUB_447_B_NUM=DRY-RUN" >> "$GITHUB_OUTPUT"
          else
            NUM=$(gh issue create \
              --repo "$REPO" \
              --title "feat: real-time data health indicators on all dashboard pages [#447 child]" \
              --body "$BODY" \
              --label "enhancement" \
              --assignee paulglasow \
              | grep -o '[0-9]*$')
            echo "SUB_447_B_NUM=$NUM" >> "$GITHUB_OUTPUT"
            echo "✅ Created sub-issue #$NUM (health indicators)"
          fi

      - name: Create sub-issue #447-C — Workflow automation test expansion
        id: sub_447_c
        run: |
          BODY='## Expand Workflow Automation Test Coverage

          **Parent epic:** #447 — Data Quality, Monitoring & Infrastructure Enhancements

          ### Objective
          Add automated tests that verify key GitHub Actions workflow files have required error-handling patterns, and add a smoke test for the data-source monitoring workflow.

          ### Acceptance Criteria
          - [ ] Python tests in `tests/` verify that each scheduled data workflow includes an explicit `if: failure()` notification step or equivalent
          - [ ] Smoke test for `data-source-monitoring.yml` confirms the script (`scripts/data-source-monitor.js`) correctly identifies stale sources in a mock inventory
          - [ ] `pytest tests/ -v` continues to pass with all new tests
          - [ ] New tests added to `ci-checks.yml` under the Python test step

          **Effort:** Small (~0.5 days)'

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would create sub-issue for #447 (workflow test expansion)"
            echo "SUB_447_C_NUM=DRY-RUN" >> "$GITHUB_OUTPUT"
          else
            NUM=$(gh issue create \
              --repo "$REPO" \
              --title "test: expand workflow automation test coverage [#447 child]" \
              --body "$BODY" \
              --label "enhancement" \
              --assignee paulglasow \
              | grep -o '[0-9]*$')
            echo "SUB_447_C_NUM=$NUM" >> "$GITHUB_OUTPUT"
            echo "✅ Created sub-issue #$NUM (workflow tests)"
          fi

      # ── Step 6: Post status update on #578 with sub-issue links ──────────
      - name: Post status update on #578
        run: |
          A446="${{ steps.sub_446_a.outputs.SUB_446_A_NUM || 'PENDING' }}"
          B446="${{ steps.sub_446_b.outputs.SUB_446_B_NUM || 'PENDING' }}"
          A447="${{ steps.sub_447_a.outputs.SUB_447_A_NUM || 'PENDING' }}"
          B447="${{ steps.sub_447_b.outputs.SUB_447_B_NUM || 'PENDING' }}"
          C447="${{ steps.sub_447_c.outputs.SUB_447_C_NUM || 'PENDING' }}"

          BODY="## Status Update — 2026-04-15

          ### ✅ Immediate Verification — Complete

          | Item | Status |
          |------|--------|
          | \`market_data_build.yml\` | ✅ Last run: 2026-04-13 — success (run #40) |
          | \`build-hna-data.yml\` | ✅ Last run: 2026-04-13 — success (run #37) |
          | JS + Python tests | ✅ pro-forma: 24/24 · qap-simulator: 64/64 · CI: 28/28 |
          | Fonts (WOFF2) | ✅ 8 files in \`assets/fonts/\` |
          | New test files | ✅ \`test/pro-forma.test.js\`, \`test/qap-simulator.test.js\` |
          | HNA summary files | ✅ 548 files (≥546) |
          | FRED data ≥1.7 MB | ⚠️ 952 KB / 45 series — see sub-issue #$A447 |

          ### ⚠️ Known Data Issues (tracked in sub-issues)

          - **\`data/fred-data.json\` size** (952 KB vs expected ≥1.7 MB): investigate missing series → tracked in #$A447
          - **\`data/market/tract_boundaries_co.geojson\` has 0 features**: requires \`CENSUS_API_KEY\` secret to be set, then re-trigger \`market_data_build.yml\`

          ### 🔗 Sub-Issues Created (Remaining Roadmap Work)

          **Epic #446 — Documentation & Testing:**
          - #$A446 — Auto-generate API documentation with JSDoc
          - #$B446 — Add CI test coverage reporting

          **Epic #447 — Data Quality & Infrastructure:**
          - #$A447 — ETL validation hardening (includes FRED size investigation)
          - #$B447 — Real-time data health indicators in UI
          - #$C447 — Expand workflow automation test coverage

          ### 🏁 Remaining Roadmap Items (not yet sub-issued)

          - [ ] Add \`CENSUS_API_KEY\` secret → re-trigger \`market_data_build.yml\` to populate \`tract_boundaries_co.geojson\`
          - [ ] Build multi-county aggregation for PMA views
          - [ ] Parcel/zoning integration (see \`docs/FEATURE_COMPLETE.md\`)
          - [ ] Historical trends, rent roll benchmarking (UI polish phase 3c)

          ### 🗂️ Duplicate Tracker Cleanup
          - #577 closed as duplicate of this issue
          - #550 closed as QA gate resolved (all 7 items verified)
          - #516 closed as resolved CI incident

          _Posted by automated triage — 2026-04-15_"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would post status update on #578"
            echo "$BODY"
          else
            gh issue comment 578 --repo "$REPO" --body "$BODY"
            echo "✅ Posted status update on #578"
          fi

      # ── Step 7: Post remaining-scope comment on #446 ──────────────────────
      - name: Post remaining scope on #446
        run: |
          A446="${{ steps.sub_446_a.outputs.SUB_446_A_NUM || 'PENDING' }}"
          B446="${{ steps.sub_446_b.outputs.SUB_446_B_NUM || 'PENDING' }}"

          BODY="## Remaining Scope Update — 2026-04-15

          Phase 3 documentation and test work has progressed substantially. The following items are already complete:
          - ✅ \`docs/PHASE3_PLAN.md\`, \`docs/PHASE3_IMPLEMENTATION_GUIDE.md\` authored
          - ✅ Unit tests: 258 total (lihtc-deal-predictor: 110, legislative-tracker: 148)
          - ✅ Pro-forma and QAP simulator test files wired into CI
          - ✅ Phase 3 doc updates committed (FEATURE_COMPLETE.md, CHANGELOG.md, etc.)

          **Remaining scope (explicit child issues created):**
          - #$A446 — Auto-generate API documentation with JSDoc
          - #$B446 — Add CI test coverage reporting

          This epic will be closed when both child issues are resolved.

          _Posted by automated triage — 2026-04-15_"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would post scope update on #446"
            echo "$BODY"
          else
            gh issue comment 446 --repo "$REPO" --body "$BODY"
            echo "✅ Posted scope update on #446"
          fi

      # ── Step 8: Post remaining-scope comment on #447 ──────────────────────
      - name: Post remaining scope on #447
        run: |
          A447="${{ steps.sub_447_a.outputs.SUB_447_A_NUM || 'PENDING' }}"
          B447="${{ steps.sub_447_b.outputs.SUB_447_B_NUM || 'PENDING' }}"
          C447="${{ steps.sub_447_c.outputs.SUB_447_C_NUM || 'PENDING' }}"

          BODY="## Remaining Scope Update — 2026-04-15

          Phase 3 data quality and infrastructure work already completed:
          - ✅ WCAG 2.1 AA accessibility compliance across all 38 pages
          - ✅ Contrast audit CI workflow active
          - ✅ \`fetchNOAAClimateData()\` and \`fetchUtilityCapacity()\` stubs replaced with local-first patterns
          - ✅ 9 new market data validators added to \`scripts/validate-schemas.js\`
          - ✅ 8 Phase 3 data files added to \`ci-checks.yml\` artifact existence checks

          **Remaining scope (explicit child issues created):**
          - #$A447 — ETL validation hardening (fail loudly on required field nulls; includes FRED size investigation)
          - #$B447 — Real-time data health indicators in UI
          - #$C447 — Expand workflow automation test coverage

          This epic will be closed when all three child issues are resolved.

          _Posted by automated triage — 2026-04-15_"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would post scope update on #447"
            echo "$BODY"
          else
            gh issue comment 447 --repo "$REPO" --body "$BODY"
            echo "✅ Posted scope update on #447"
          fi

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  Issue Triage Summary"
          echo "════════════════════════════════════════════"
          echo "  #516 → closed (stale CI incident)"
          echo "  #577 → closed (duplicate of #578)"
          echo "  #550 → closed (QA gate resolved)"
          echo "  #578 → status update posted"
          echo "  #446 → 2 child issues created, scope comment posted"
          echo "  #447 → 3 child issues created, scope comment posted"
          echo "════════════════════════════════════════════"
