name: Fetch HUD CHAS Affordability Data

# Downloads HUD CHAS 2018-2022 cost-burden cross-tabulations for Colorado,
# aggregates to county level, and writes:
#   data/market/chas_co.json              — raw Colorado CHAS records
#   data/hna/chas_affordability_gap.json  — county-level affordability gap for HNA dashboard
#
# If the HUD download fails the existing stub files are preserved unchanged.

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 03:00 UTC (before other HNA fetches)
  workflow_dispatch:        # Allow manual triggering from the Actions tab

permissions:
  contents: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  fetch-chas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch and process HUD CHAS data
        run: python3 scripts/fetch_chas.py

      - name: Validate output files
        run: |
          echo "── Validating output files ──"
          for f in data/market/chas_co.json data/hna/chas_affordability_gap.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing output file: $f"
              exit 1
            fi
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            echo "  $f: ${size} bytes"
            python3 -c "import json; d=json.load(open('$f')); print('  JSON valid'); print('  meta.generated:', d['meta'].get('generated','missing')) if 'meta' in d else None" || { echo "::error::$f is not valid JSON"; exit 1; }
          done
          # Verify FIPS codes are 5-digit (Rule 1)
          python3 -c "import json,sys; d=json.load(open('data/hna/chas_affordability_gap.json')); counties=d.get('counties',{}); bad=[k for k in counties if len(str(k))!=5]; [print(f'::error::Non 5-digit county FIPS found: {bad}',file=sys.stderr),sys.exit(1)] if bad else print(f'  FIPS validation passed ({len(counties)} counties)')"
          # Verify chas_co.json has non-zero records
          python3 << 'PYEOF'
          import json, sys
          d = json.load(open('data/market/chas_co.json'))
          records = d.get('records', [])
          count = len(records)
          print(f'  chas_co.json record count: {count}')
          if count == 0:
              print('::error::chas_co.json has 0 records — CHAS fetch likely failed', file=sys.stderr)
              sys.exit(1)
          print(f'  Record count validation passed ({count} records)')
          PYEOF

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode empty-dataset --workflow fetch-chas-data.yml --run-id ${context.runId} --data-file data/hna/chas_affordability_gap.json --details "HUD CHAS data fetch or validation failed. Check HUD data availability."`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }

      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 scripts/rebuild_manifest.py
          git add data/market/chas_co.json data/hna/chas_affordability_gap.json data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update HUD CHAS affordability gap data [$(date -u '+%Y-%m-%d')]"
            git pull --rebase --autostash -X theirs origin main
            git push
          fi
