name: CI Checks — Critical Artifacts & Pages

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify critical artifacts exist
        shell: bash
        run: |
          set -e
          errors=0

          check_file() {
            if [ -f "$1" ]; then
              echo "✅  $1"
            else
              echo "::error::Missing required file: $1"
              errors=$((errors + 1))
            fi
          }

          echo "=== Checking required pages ==="
          check_file "market-analysis.html"
          check_file "market-intelligence.html"
          check_file "dashboard-data-sources-ui.html"

          echo ""
          echo "=== Checking required JS files ==="
          check_file "js/market-analysis.js"
          check_file "js/market-intelligence.js"
          check_file "js/data-service-portable.js"
          check_file "js/data-source-inventory.js"
          check_file "js/temporal-dashboard.js"
          check_file "js/geographic-dashboard.js"

          echo ""
          echo "=== Checking required CSS files ==="
          check_file "css/data-dashboard.css"

          echo ""
          echo "=== Checking required data artifacts ==="
          check_file "data/policy/prop123_jurisdictions.json"
          check_file "data/market/tract_centroids_co.json"
          check_file "data/market/acs_tract_metrics_co.json"
          check_file "data/market/hud_lihtc_co.geojson"

          echo ""
          echo "=== Checking Phase 3 market data artifacts ==="
          check_file "data/market/lodes_co.json"
          check_file "data/market/food_access_co.json"
          check_file "data/market/opportunity_insights_co.json"
          check_file "data/market/flood_zones_co.json"
          check_file "data/market/epa_sld_co.json"
          check_file "data/market/dola_demographics_co.json"
          check_file "data/market/climate_hazards_co.json"
          check_file "data/market/utility_capacity_co.geojson"

          if [ $errors -gt 0 ]; then
            echo ""
            echo "::error::$errors required file(s) are missing."
            exit 1
          fi
          echo ""
          echo "All required files present."

      - name: Verify HTML pages include their JS scripts
        shell: bash
        run: |
          set -e
          errors=0

          check_script_ref() {
            local html_file="$1"
            local js_file="$2"
            if grep -q "$js_file" "$html_file"; then
              echo "✅  $html_file includes $js_file"
            else
              echo "::error::$html_file does not reference $js_file"
              errors=$((errors + 1))
            fi
          }

          echo "=== Checking script tag references ==="
          check_script_ref "market-analysis.html"          "js/market-analysis.js"
          check_script_ref "market-analysis.html"          "js/lihtc-deal-predictor.js"
          check_script_ref "market-intelligence.html"      "js/market-intelligence.js"
          check_script_ref "deal-calculator.html"          "js/deal-calculator.js"
          check_script_ref "deal-calculator.html"          "js/lihtc-deal-predictor.js"
          check_script_ref "dashboard-data-sources-ui.html" "js/data-source-inventory.js"
          check_script_ref "dashboard-data-sources-ui.html" "js/temporal-dashboard.js"
          check_script_ref "dashboard-data-sources-ui.html" "js/geographic-dashboard.js"

          if [ $errors -gt 0 ]; then
            echo ""
            echo "::error::$errors script reference(s) missing from HTML pages."
            exit 1
          fi
          echo ""
          echo "All script references verified."

      - name: Validate JSON data artifacts
        shell: bash
        run: |
          set -e
          errors=0

          validate_json() {
            local file="$1"
            if python3 -c "import json, sys; json.load(open('$file'))" 2>/dev/null; then
              echo "✅  $file is valid JSON"
            else
              echo "::error::$file is not valid JSON"
              errors=$((errors + 1))
            fi
          }

          echo "=== Validating JSON files ==="
          validate_json "data/policy/prop123_jurisdictions.json"
          validate_json "data/market/tract_centroids_co.json"
          validate_json "data/market/acs_tract_metrics_co.json"
          validate_json "data/market/hud_lihtc_co.geojson"
          validate_json "data/market/lodes_co.json"
          validate_json "data/market/food_access_co.json"
          validate_json "data/market/opportunity_insights_co.json"
          validate_json "data/market/flood_zones_co.json"
          validate_json "data/market/epa_sld_co.json"
          validate_json "data/market/dola_demographics_co.json"
          validate_json "data/market/climate_hazards_co.json"
          validate_json "data/market/utility_capacity_co.geojson"

          if [ $errors -gt 0 ]; then
            echo ""
            echo "::error::$errors JSON file(s) failed validation."
            exit 1
          fi
          echo ""
          echo "All JSON artifacts are valid."

      - name: Portability checks (no raw fetch paths)
        shell: bash
        run: |
          set -e

          echo "Checking for fragile fetch paths..."
          if grep -R --line-number \
               --exclude-dir=.git \
               --exclude-dir=node_modules \
               --exclude-dir=.github \
               --exclude-dir=test \
               'fetch("data/' .; then
            echo "::error::Found fetch(\"data/\") usage. Use DataService.getJSON(DataService.baseData(...)) instead."
            exit 1
          fi

          if grep -R --line-number \
               --exclude-dir=.git \
               --exclude-dir=node_modules \
               --exclude-dir=.github \
               --exclude-dir=test \
               'fetch("maps/' .; then
            echo "::error::Found fetch(\"maps/\") usage. Use DataService.getGeoJSON(DataService.baseMaps(...)) instead."
            exit 1
          fi

          echo "✅  No fragile fetch paths found."

      - name: Validate JSON schemas for critical artifacts
        id: schema_validate
        # Keep continue-on-error: true so schema drift doesn't block PRs
        # while the schema contract is still maturing. The next step
        # promotes the output into the job summary so failures are
        # visible on the run page without manual log-reading (see #657).
        continue-on-error: true
        run: |
          set +e
          node scripts/validate-schemas.js | tee /tmp/schema-validate.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Surface schema validation into job summary
        if: always()
        shell: bash
        run: |
          if [ ! -s /tmp/schema-validate.log ]; then
            echo "::warning::validate-schemas produced no output"
            exit 0
          fi
          # Parse the tail line: "Results: N passed, M failed"
          summary=$(grep -E '^Results: [0-9]+ passed, [0-9]+ failed' /tmp/schema-validate.log | tail -n1 || true)
          failed=$(echo "$summary" | sed -n 's/.* \([0-9]\+\) failed.*/\1/p')
          failed=${failed:-0}
          {
            echo '## Schema validation'
            echo ""
            if [ -n "$summary" ]; then
              echo "**$summary**"
            else
              echo "_Schema validator produced no summary line — check raw log._"
            fi
            echo ""
            if [ "$failed" -gt 0 ] 2>/dev/null; then
              echo "### Failures"
              echo '```'
              grep -E '^\s*❌|^\s*FAIL' /tmp/schema-validate.log | head -40 || true
              echo '```'
            fi
            echo ""
            echo "<details><summary>Raw validator output (last 100 lines)</summary>"
            echo ""
            echo '```'
            tail -n 100 /tmp/schema-validate.log
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$failed" -gt 0 ] 2>/dev/null; then
            echo "::warning::Schema validation reported $failed failure(s). See the Summary tab for details. (Non-blocking per the current continue-on-error posture — see #657 to flip.)"
          fi

      # ── JavaScript smoke tests ──
      - name: Install Node.js dependencies
        run: npm ci

      - name: Run unified CI test suite
        run: npm run test:ci

      - name: Run JS smoke tests
        run: |
          node test/smoke.test.js
          node test/smoke-fmr.test.js
          node test/data-quality-check.test.js
          node test/fetch-chfa-lihtc-fips.js
          node test/qap-simulator.test.js
          node test/pro-forma.test.js

      - name: Run source URL sweep on changed files (blocking on PRs)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ github.base_ref }}"
          git fetch origin "$base_ref" --depth=1
          changed=$(git diff --name-only "origin/$base_ref"...HEAD | tr '\n' ',' | sed 's/,$//')
          if [ -z "$changed" ]; then
            echo "No changed files detected; skipping URL sweep."
            exit 0
          fi
          echo "Changed files: $changed"
          node scripts/audit/source-url-sweep.mjs --quiet --paths "$changed"

      - name: Run source citation URL sweep (non-blocking signal)
        continue-on-error: true
        shell: bash
        run: |
          set +e
          node scripts/audit/source-url-sweep.mjs --quiet | tee /tmp/source-url-sweep.log
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -ne 0 ]; then
            echo "::warning::Source URL sweep reported failures (exit $exit_code). Review /tmp/source-url-sweep.log."
          fi
          {
            echo "## Source URL sweep"
            echo ""
            if [ "$exit_code" -eq 0 ]; then
              echo "✅ No hard failures reported."
            else
              echo "⚠️ Sweep reported one or more hard failures (non-blocking in CI checks)."
              echo ""
              echo '```'
              tail -n 80 /tmp/source-url-sweep.log || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      # ── Python test suites ──
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: pip install pytest python-dateutil

      - name: Run pytest suite
        run: pytest tests/ -v --tb=short
        # Note: previously a separate "Run standalone Python tests" step
        # invoked test/economic_indicators_test.py and
        # test/build_counties_co_test.py. Those files have been moved into
        # tests/ (see Phase 8 consolidation PR) so pytest now discovers
        # and runs them as part of the suite above. demographic_projections_test.py
        # has also been moved and is now exercised — it was orphaned before
        # (existed in test/ but never invoked by any workflow).
