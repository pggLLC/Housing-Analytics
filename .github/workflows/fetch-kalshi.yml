name: Fetch Kalshi Prediction Market Data

on:
  schedule:
    - cron: '0 3 * * 1'   # Weekly — every Monday at 03:00 UTC
  workflow_dispatch:        # Allow manual triggering from the Actions tab

permissions:
  contents: write
  issues: write

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  fetch-kalshi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Environment diagnostics
        run: |
          echo "── Node.js version ──"
          node --version
          echo "── npm version ──"
          npm --version
          echo "── Disk space ──"
          df -h .
          echo "── Run context ──"
          echo "  Repository : $GITHUB_REPOSITORY"
          echo "  Run ID     : $GITHUB_RUN_ID"
          echo "  Actor      : $GITHUB_ACTOR"
          echo "  Ref        : $GITHUB_REF"
          echo "── API credential check ──"
          if [ -n "$KALSHI_API_KEY" ]; then
            echo "  KALSHI_API_KEY: set (${#KALSHI_API_KEY} chars)"
          else
            echo "  KALSHI_API_KEY: NOT SET ⚠️"
            echo "::warning::KALSHI_API_KEY is not configured. Set it in Settings → Secrets and variables → Actions."
          fi
          if [ -n "$KALSHI_API_SECRET" ]; then
            echo "  KALSHI_API_SECRET: set (${#KALSHI_API_SECRET} chars)"
          else
            echo "  KALSHI_API_SECRET: NOT SET ⚠️"
            echo "::warning::KALSHI_API_SECRET is not configured. Set it in Settings → Secrets and variables → Actions."
          fi
          echo "  Obtain credentials at: https://kalshi.com/account/api"
        env:
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_API_SECRET: ${{ secrets.KALSHI_API_SECRET }}

      - name: Fetch Kalshi prediction market data
        id: fetch
        env:
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_API_SECRET: ${{ secrets.KALSHI_API_SECRET }}
          KALSHI_API_BASE_URL: ${{ secrets.KALSHI_API_BASE_URL }}
        run: |
          echo "── Starting Kalshi fetch at $(date -u) ──"
          node scripts/kalshi/fetch_kalshi_prediction_markets.js
          echo "── Fetch completed at $(date -u) ──"

      - name: Validate output
        id: validate
        run: |
          OUT="data/kalshi/prediction-market.json"
          echo "── Validating $OUT ──"
          if [ ! -f "$OUT" ]; then
            echo "::error::Output file not found: $OUT"
            exit 1
          fi
          size=$(stat -c%s "$OUT" 2>/dev/null || stat -f%z "$OUT")
          echo "  File size: ${size} bytes"
          if [ "$size" -eq 0 ]; then
            echo "::error::Output file is empty (0 bytes)"
            exit 1
          fi
          if ! python3 -c "import json,sys; d=json.load(open('$OUT')); print('  JSON valid: ✅'); print(f'  Keys: {list(d.keys()) if isinstance(d,dict) else type(d).__name__}')"; then
            echo "::error::Output file contains invalid JSON"
            exit 1
          fi
          echo "  Validation passed ✅"

      - name: Alert on empty dataset
        if: failure()
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync(
                `node scripts/monitoring/alert.js --mode empty-dataset --workflow fetch-kalshi.yml --run-id ${context.runId} --data-file data/kalshi/prediction-market.json --details "Kalshi fetch or validation failed"`,
                { stdio: 'inherit', env: { ...process.env } }
              );
            } catch (e) {
              console.error('Alert script failed:', e.message);
            }

      - name: Commit and push data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kalshi/prediction-market.json
          if git diff --cached --quiet; then
            echo "No changes to commit — data is up to date."
          else
            git commit -m "chore: update Kalshi prediction market data [$(date -u '+%Y-%m-%d')]"
            git pull --rebase --autostash -X theirs origin main
            git push
          fi
