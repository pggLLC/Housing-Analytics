name: Fetch CHFA LIHTC Data

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday at 05:00 UTC
  workflow_dispatch:        # Allow manual triggering

permissions:
  contents: write

jobs:
  fetch-chfa-lihtc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Environment diagnostics
        run: |
          echo "── Node.js version ──"
          node --version
          echo "── npm version ──"
          npm --version
          echo "── Run context ──"
          echo "  Repository : $GITHUB_REPOSITORY"
          echo "  Run ID     : $GITHUB_RUN_ID"
          echo "  Actor      : $GITHUB_ACTOR"
          echo "  Ref        : $GITHUB_REF"
          echo "── Endpoint config ──"
          node -e "const c=require('./scripts/lihtc-co-query.json'); console.log('  Host:', c.host); console.log('  BasePath:', c.basePath); console.log('  WHERE:', c.where);"

      - name: Fetch CHFA LIHTC data
        id: fetch
        run: |
          echo "── Starting CHFA LIHTC fetch at $(date -u) ──"
          node scripts/fetch-chfa-lihtc.js
          echo "── Fetch completed at $(date -u) ──"

      - name: Validate output and report feature count
        id: validate
        run: |
          OUT="data/chfa-lihtc.json"
          echo "── Validating $OUT ──"
          if [ ! -f "$OUT" ]; then
            echo "::error::Output file not found: $OUT"
            exit 1
          fi
          size=$(stat -c%s "$OUT" 2>/dev/null || stat -f%z "$OUT" 2>/dev/null || echo 0)
          echo "  File size: ${size} bytes"
          if [ "$size" -eq 0 ]; then
            echo "::error::Output file is empty (0 bytes)"
            exit 1
          fi
          python3 scripts/validate-chfa-lihtc.py

      - name: Split LIHTC data by county
        run: node scripts/split-lihtc-by-county.js

      - name: Commit and push data file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/chfa-lihtc.json data/hna/lihtc/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update CHFA LIHTC data [$(date -u '+%Y-%m-%d')]"
            git pull --rebase --autostash origin main
            git push
          fi
