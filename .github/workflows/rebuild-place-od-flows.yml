name: Rebuild Place and Tract OD Flows

# Monthly rebuild of block-classified LEHD LODES origin-destination flows:
# - data/hna/place-od-flows.json, aggregated to place and consumed by HNA /
#   OF / PMA context surfaces.
# - data/market/lodes_tract_od_co.json, exact tract-to-tract context substrate
#   for the future D-full commute-shaped PMA mode. Context-only; no scoring
#   consumer is wired by this workflow.
#
# LODES releases new OD files annually around mid-summer. A monthly run
# is enough cadence to pick up new vintages without burning bandwidth on
# the ~2.45M block-block rows every day.

on:
  # First of every month at 17:00 UTC = 11:00 America/Denver in DST.
  schedule:
    - cron: '0 17 1 * *'
  # Also rebuild when the script or its dependencies change.
  push:
    branches: ['main']
    paths:
      - 'scripts/hna/build_place_od_flows.py'
      - 'scripts/hna/build_tract_od_matrix.py'
      - '.github/workflows/rebuild-place-od-flows.yml'
  workflow_dispatch:
    inputs:
      year:
        description: 'LODES OD year (e.g. 2023, 2022)'
        required: false
        default: '2023'

permissions:
  contents: write
  actions: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # 2.45M row stream + parquet read can take several minutes on a cold runner.
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests
          # If the script needs more deps, add to a requirements file later.

      - name: Build place-OD flows
        env:
          YEAR: ${{ inputs.year || '2023' }}
        run: |
          python scripts/hna/build_place_od_flows.py --year "$YEAR"
          python scripts/hna/build_tract_od_matrix.py --year "$YEAR"

      - name: Commit refreshed flows
        id: data-commit
        run: |
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          if git diff --quiet data/hna/place-od-flows.json data/market/lodes_tract_od_co.json; then
            echo "Block-OD flows unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hna/place-od-flows.json data/market/lodes_tract_od_co.json
          # F158 — Same YAML block-scalar bug as F157 on sync-data-mtimes:
          # the multi-line `git commit -m "…"` quoted string continued
          # below the `run: |` block's indentation envelope, so YAML treated
          # line 71 ("Automated by …") as a new top-level key and the
          # workflow failed to parse on every trigger. Write the commit
          # message into a tmpfile via a printf HEREDOC inside the block
          # scalar (no unindented continuations) and `git commit -F`.
          msg=$(mktemp)
          {
            printf 'chore(data): rebuild place-OD flows (block-classified LEHD LODES)\n\n'
            printf 'Automated by .github/workflows/rebuild-place-od-flows.yml — keeps the\n'
            printf 'block-OD aggregates that back HNA / OF / PMA / Compare commute panels\n'
            printf 'and the context-only tract OD artifact fresh against the latest LODES\n'
            printf 'vintage.\n\n'
            printf 'Source: LODES OD %s, downloaded by build_place_od_flows.py.\n' "${YEAR:-unknown}"
          } > "$msg"
          git commit -F "$msg"
          rm -f "$msg"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.data-commit.outputs.pushed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
            core.notice('Dispatched deploy.yml for OD flow data commit.');
