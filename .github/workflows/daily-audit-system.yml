name: Daily Audit System

on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 09:00 UTC
  workflow_dispatch:        # Allow manual triggering

jobs:
  audit:
    name: Full Diagnostic Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── Setup ───────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install audit dependencies
        run: npm ci --ignore-scripts

      # ── Unit & Smoke Tests ───────────────────────────────────────────────────
      - name: Run unit tests
        run: node test/website-monitor.test.js
        continue-on-error: true

      # ── Full Daily Audit ─────────────────────────────────────────────────────
      - name: Run Daily Audit System
        env:
          WEBSITE_URL:       ${{ secrets.WEBSITE_URL }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          EMAIL_USER:        ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node test/daily-audit-system.js
        continue-on-error: true

      # ── Legacy Checks (kept for compatibility) ───────────────────────────────
      - name: Verify script loads
        run: node test/verify-script-loads.js
        continue-on-error: true

      - name: Test fallback mechanisms
        run: node test/test-fallback-mechanisms.js
        continue-on-error: true

      - name: Run Lighthouse audit
        run: node test/lighthouse-audit.js
        continue-on-error: true

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload audit reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: audit-reports-${{ github.run_number }}
          path: |
            monitoring-reports/
          retention-days: 90
