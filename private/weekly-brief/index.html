<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#096e65" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0fd4cf" media="(prefers-color-scheme: dark)">
  <title>Weekly Housing Intelligence Brief | COHO Analytics</title>
  <style>
    /* Scoped styles for the hidden weekly brief page */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: #eef2f7;
      color: #0d1f35;
      margin: 0;
      padding: 0;
      font-size: 0.938rem;
      line-height: 1.6;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .skip-link:focus {
      left: 1rem;
      top: 1rem;
      width: auto;
      height: auto;
      padding: 0.5rem 1rem;
      background: #096e65;
      color: #fff;
      border-radius: 6px;
      z-index: 9999;
      text-decoration: none;
    }

    header {
      background: #fff;
      border-bottom: 1px solid rgba(13,31,53,.11);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header .brand {
      font-size: 0.8rem;
      font-weight: 700;
      color: #096e65;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
      color: #0d1f35;
    }
    header .header-meta {
      margin-left: auto;
      font-size: 0.75rem;
      color: #476080;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pill-accent { background: #096e65; color: #fff; }
    .pill-muted  { background: #e4ecf4; color: #476080; }
    .pill-info   { background: #dbeafe; color: #1e40af; }

    .section-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(13,31,53,.06), 0 0 0 1px rgba(13,31,53,.07);
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .section-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(13,31,53,.08);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-header h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      color: #0d1f35;
    }
    .section-count {
      font-size: 0.75rem;
      color: #476080;
      margin-left: auto;
    }
    .article-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .article-list li {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid rgba(13,31,53,.06);
    }
    .article-list li:last-child { border-bottom: none; }
    .article-list a {
      color: #005a9c;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .article-list a:hover { text-decoration: underline; }
    .article-meta {
      font-size: 0.72rem;
      color: #476080;
      margin-top: 0.15rem;
    }
    .empty-state {
      padding: 1.5rem 1rem;
      color: #476080;
      font-size: 0.85rem;
    }

    .signals-section { margin-bottom: 1.5rem; }
    .signals-section h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
      color: #0d1f35;
    }
    .signals-note {
      font-size: 0.75rem;
      color: #476080;
      margin-bottom: 0.75rem;
    }
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .signal-card {
      background: #fff;
      border-radius: 10px;
      padding: 0.875rem 1rem;
      box-shadow: 0 2px 8px rgba(13,31,53,.06), 0 0 0 1px rgba(13,31,53,.07);
    }
    .signal-card h3 {
      font-size: 0.72rem;
      font-weight: 700;
      color: #476080;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 0.35rem;
    }
    .signal-count {
      font-size: 1.75rem;
      font-weight: 800;
      color: #0d1f35;
      line-height: 1;
    }
    .signal-terms {
      font-size: 0.7rem;
      color: #476080;
      margin-top: 0.35rem;
    }

    .archive-section { margin-top: 2rem; }
    .archive-section h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #0d1f35;
      margin: 0 0 0.75rem;
    }
    .archive-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(13,31,53,.06), 0 0 0 1px rgba(13,31,53,.07);
    }
    .archive-table th {
      text-align: left;
      padding: 0.6rem 1rem;
      background: #f7fafd;
      color: #476080;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid rgba(13,31,53,.08);
    }
    .archive-table td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid rgba(13,31,53,.06);
    }
    .archive-table tr:last-child td { border-bottom: none; }
    .archive-table a { color: #005a9c; text-decoration: none; }
    .archive-table a:hover { text-decoration: underline; }

    #loadingState {
      text-align: center;
      padding: 3rem;
      color: #476080;
    }
    #errorState {
      background: #fef2f2;
      border: 1px solid rgba(153,27,27,.2);
      border-radius: 10px;
      padding: 1.25rem;
      color: #991b1b;
      display: none;
    }

    footer {
      background: #fff;
      border-top: 1px solid rgba(13,31,53,.08);
      padding: 1rem 1.5rem;
      font-size: 0.75rem;
      color: #476080;
      text-align: center;
    }

    #aria-live-region {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      header { flex-wrap: wrap; }
      header h1 { font-size: 0.95rem; }
      .signal-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div id="aria-live-region" role="status" aria-live="polite" aria-atomic="true"></div>

<header>
  <span class="brand">COHO Analytics</span>
  <h1>Weekly Housing Intelligence Brief</h1>
  <span class="header-meta" id="headerMeta">Loading…</span>
</header>

<main id="main-content">
  <div id="loadingState">Loading latest brief…</div>
  <div id="errorState" role="alert"></div>
  <div id="briefContent" style="display:none;">
    <div class="pills" id="pillsRow"></div>

    <div id="sectionsContainer"></div>

    <div class="signals-section">
      <h2>Signal Counts</h2>
      <p class="signals-note" id="signalsNote"></p>
      <div class="signal-grid" id="signalGrid"></div>
    </div>

    <div class="archive-section">
      <h2>Archive</h2>
      <div id="archiveContainer">
        <p style="font-size:.85rem;color:#476080;">Loading archive…</p>
      </div>
    </div>
  </div>
</main>

<footer>
  COHO Analytics — Weekly Housing Intelligence Brief &mdash;
  This page is not indexed by search engines and is not linked from site navigation.
</footer>

<script>
(function () {
  'use strict';

  const BASE = (function () {
    // Resolve base path relative to this page's location
    const s = document.currentScript || {};
    return './';
  })();

  function announce(msg) {
    const el = document.getElementById('aria-live-region');
    if (el) el.textContent = msg;
  }

  function showError(msg) {
    const err = document.getElementById('errorState');
    const loading = document.getElementById('loadingState');
    if (loading) loading.style.display = 'none';
    if (err) {
      err.style.display = 'block';
      err.textContent = 'Error: ' + msg;
    }
    announce('Error loading brief: ' + msg);
  }

  function fetchJSON(url) {
    return fetch(url)
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' for ' + url);
        return r.json();
      });
  }

  function fmtDate(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    } catch (e) { return iso.slice(0, 10); }
  }

  function renderPills(payload) {
    var row = document.getElementById('pillsRow');
    if (!row) return;
    var weekLabel = payload.week_start ? 'Week of ' + fmtDate(payload.week_start) : '';
    var countLabel = (payload.total_articles || 0) + ' articles';
    var genLabel = payload.generated_at ? 'Generated ' + fmtDate(payload.generated_at) : '';
    var pills = [
      weekLabel ? '<span class="pill pill-accent">' + esc(weekLabel) + '</span>' : '',
      '<span class="pill pill-muted">' + esc(countLabel) + '</span>',
      genLabel ? '<span class="pill pill-muted">' + esc(genLabel) + '</span>' : '',
    ].filter(Boolean).join('');
    row.innerHTML = pills;
  }

  function renderSections(payload) {
    var container = document.getElementById('sectionsContainer');
    if (!container) return;
    var regions = ['Colorado', 'Western Slope', 'National'];
    var html = '';
    regions.forEach(function (region) {
      var articles = (payload.sections || {})[region] || [];
      html += '<div class="section-card">';
      html += '<div class="section-header">';
      html += '<h2>' + esc(region) + '</h2>';
      html += '<span class="section-count">' + articles.length + ' articles</span>';
      html += '</div>';
      if (articles.length === 0) {
        html += '<div class="empty-state">No articles this week.</div>';
      } else {
        html += '<ul class="article-list" aria-label="' + esc(region) + ' articles">';
        articles.forEach(function (art) {
          var meta = [art.source, art.published ? art.published.slice(0, 16) : '']
            .filter(Boolean).join(' · ');
          html += '<li>';
          html += '<a href="' + esc(art.link || '#') + '" target="_blank" rel="noopener noreferrer">';
          html += esc(art.title || '(no title)');
          html += '</a>';
          if (meta) html += '<div class="article-meta">' + esc(meta) + '</div>';
          html += '</li>';
        });
        html += '</ul>';
      }
      html += '</div>';
    });
    container.innerHTML = html;
  }

  function renderSignals(payload) {
    var grid = document.getElementById('signalGrid');
    var note = document.getElementById('signalsNote');
    if (!grid) return;
    if (note) note.textContent = payload.signals_explain || '';
    var signals = payload.signals || {};
    var html = '';
    Object.keys(signals).forEach(function (bucket) {
      var data = signals[bucket] || {};
      var count = data.count || 0;
      var terms = (data.top_terms || []).join(', ') || '—';
      html += '<div class="signal-card">';
      html += '<h3>' + esc(bucket) + '</h3>';
      html += '<div class="signal-count" aria-label="' + esc(bucket) + ' signal count: ' + count + '">' + count + '</div>';
      html += '<div class="signal-terms">' + esc(terms) + '</div>';
      html += '</div>';
    });
    grid.innerHTML = html || '<p style="color:#476080;font-size:.85rem;">No signal data.</p>';
  }

  function renderArchive(index) {
    var container = document.getElementById('archiveContainer');
    if (!container) return;
    var entries = (index && index.entries) || [];
    if (entries.length === 0) {
      container.innerHTML = '<p style="font-size:.85rem;color:#476080;">No archived briefs yet.</p>';
      return;
    }
    var rows = '';
    entries.forEach(function (e) {
      rows += '<tr>';
      rows += '<td><a href="' + esc(e.html_path || '#') + '">' + esc(e.week_start || '') + '</a></td>';
      rows += '<td>' + (e.total_articles || 0) + '</td>';
      rows += '<td><a href="' + esc(e.json_path ? 'data/' + e.json_path : '#') + '">JSON</a></td>';
      rows += '</tr>';
    });
    container.innerHTML =
      '<table class="archive-table" aria-label="Archive of weekly briefs">' +
      '<thead><tr><th>Week</th><th>Articles</th><th>Data</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '</table>';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function init() {
    fetchJSON(BASE + 'data/latest.json')
      .then(function (payload) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('briefContent').style.display = '';

        var headerMeta = document.getElementById('headerMeta');
        if (headerMeta) {
          headerMeta.textContent = payload.week_start
            ? 'Week of ' + fmtDate(payload.week_start)
            : '';
        }

        renderPills(payload);
        renderSections(payload);
        renderSignals(payload);

        announce('Weekly brief loaded: ' + (payload.total_articles || 0) + ' articles for week of ' + (payload.week_start || ''));

        // Load archive index
        return fetchJSON(BASE + 'data/archive-index.json')
          .then(function (index) {
            renderArchive(index);
          })
          .catch(function () {
            renderArchive(null);
          });
      })
      .catch(function (err) {
        showError(err.message || 'Could not load latest.json');
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
