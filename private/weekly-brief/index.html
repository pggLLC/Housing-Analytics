<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#096e65" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0fd4cf" media="(prefers-color-scheme: dark)">
  <title>Weekly Housing Intelligence Brief | COHO Analytics</title>
  <link rel="stylesheet" href="../../css/site-theme.css">
  <script defer src="../../js/navigation.js"></script>
  <style>
    /* Scoped styles for the hidden weekly brief page */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: #eef2f7;
      color: #0d1f35;
      margin: 0;
      padding: 0;
      font-size: 0.938rem;
      line-height: 1.6;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .skip-link:focus {
      left: 1rem;
      top: 1rem;
      width: auto;
      height: auto;
      padding: 0.5rem 1rem;
      background: #096e65;
      color: #fff;
      border-radius: 6px;
      z-index: 9999;
      text-decoration: none;
    }

    /* ── Page title block ──────────────────────────────────── */
    .page-title-block {
      margin-bottom: 1.25rem;
    }
    .page-title-block h1 {
      font-size: 1.35rem;
      font-weight: 800;
      margin: 0 0 0.25rem;
      color: #0d1f35;
    }
    .page-title-meta {
      font-size: 0.8rem;
      color: #476080;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* ── Signal banner ─────────────────────────────────────── */
    .total-signals-banner {
      background: #096e65;
      color: #fff;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .total-signals-banner .ts-num {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1;
      min-width: 4rem;
      text-align: center;
    }
    .total-signals-banner .ts-text { flex: 1; }
    .total-signals-banner .ts-label {
      font-size: 0.85rem;
      opacity: 0.85;
    }
    .total-signals-banner .ts-sub {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 0.15rem;
    }

    /* ── Pills ─────────────────────────────────────────────── */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pill-accent { background: #096e65; color: #fff; }
    .pill-muted  { background: #e4ecf4; color: #476080; }
    .pill-info   { background: #dbeafe; color: #1e40af; }

    /* ── Sort bar ──────────────────────────────────────────── */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .sort-bar-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #476080;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .sort-btn {
      background: #fff;
      border: 1px solid rgba(13,31,53,.14);
      border-radius: 99px;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #476080;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .sort-btn:hover { background: #e4ecf4; }
    .sort-btn.is-active {
      background: #096e65;
      color: #fff;
      border-color: #096e65;
    }

    /* ── Section cards ─────────────────────────────────────── */
    .section-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(13,31,53,.06), 0 0 0 1px rgba(13,31,53,.07);
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .section-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(13,31,53,.08);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-header h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      color: #0d1f35;
    }
    .section-count {
      font-size: 0.75rem;
      color: #476080;
      margin-left: auto;
    }
    .section-summary {
      padding: 0.6rem 1rem 0.4rem;
      font-size: 0.8rem;
      color: #476080;
      line-height: 1.55;
      border-bottom: 1px solid rgba(13,31,53,.06);
      background: #f7fafd;
    }

    /* ── Article list ──────────────────────────────────────── */
    .article-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .article-list li {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid rgba(13,31,53,.06);
    }
    .article-list li:last-child { border-bottom: none; }
    .article-list a {
      color: #005a9c;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .article-list a:hover { text-decoration: underline; }
    .article-overflow { display: none; }
    .article-meta {
      font-size: 0.72rem;
      color: #476080;
      margin-top: 0.15rem;
    }
    .article-summary {
      font-size: 0.78rem;
      color: #476080;
      line-height: 1.5;
      margin-top: 0.2rem;
    }
    .article-signals {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-top: 0.25rem;
    }
    .signal-tag {
      display: inline-block;
      background: #e4ecf4;
      color: #476080;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.1rem 0.5rem;
      border-radius: 99px;
    }
    .show-more-row {
      padding: 0.5rem 1rem;
      border-top: 1px solid rgba(13,31,53,.06);
    }
    .show-more-btn {
      background: none;
      border: 1px solid #096e65;
      color: #096e65;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 1rem;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .show-more-btn:hover { background: #096e65; color: #fff; }

    .empty-state {
      padding: 1.5rem 1rem;
      color: #476080;
      font-size: 0.85rem;
    }

    /* ── Signals section ───────────────────────────────────── */
    .signals-section { margin-bottom: 1.5rem; }
    .signals-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.25rem;
    }
    .signals-section-header h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      color: #0d1f35;
    }
    .signals-note {
      font-size: 0.75rem;
      color: #476080;
      margin-bottom: 0.75rem;
    }
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .signal-card {
      background: #fff;
      border-radius: 10px;
      padding: 0.875rem 1rem;
      box-shadow: 0 2px 8px rgba(13,31,53,.06), 0 0 0 1px rgba(13,31,53,.07);
      cursor: pointer;
      transition: box-shadow .15s;
    }
    .signal-card:hover {
      box-shadow: 0 4px 16px rgba(9,110,101,.15), 0 0 0 1px rgba(9,110,101,.25);
    }
    .signal-card.is-selected {
      box-shadow: 0 0 0 2px #096e65;
    }
    .signal-card h3 {
      font-size: 0.72rem;
      font-weight: 700;
      color: #476080;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 0.35rem;
    }
    .signal-count {
      font-size: 1.75rem;
      font-weight: 800;
      color: #0d1f35;
      line-height: 1;
    }
    .signal-terms {
      font-size: 0.7rem;
      color: #476080;
      margin-top: 0.35rem;
    }

    /* ── Archive ───────────────────────────────────────────── */
    .archive-section { margin-top: 2rem; }
    .archive-section h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #0d1f35;
      margin: 0 0 0.75rem;
    }
    .archive-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(13,31,53,.06), 0 0 0 1px rgba(13,31,53,.07);
    }
    .archive-table th {
      text-align: left;
      padding: 0.6rem 1rem;
      background: #f7fafd;
      color: #476080;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid rgba(13,31,53,.08);
    }
    .archive-table td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid rgba(13,31,53,.06);
    }
    .archive-table tr:last-child td { border-bottom: none; }
    .archive-table a { color: #005a9c; text-decoration: none; }
    .archive-table a:hover { text-decoration: underline; }

    #loadingState {
      text-align: center;
      padding: 3rem;
      color: #476080;
    }
    #errorState {
      background: #fef2f2;
      border: 1px solid rgba(153,27,27,.2);
      border-radius: 10px;
      padding: 1.25rem;
      color: #991b1b;
      display: none;
    }

    #aria-live-region {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .signal-grid { grid-template-columns: 1fr 1fr; }
      .total-signals-banner { gap: 0.75rem; }
      .total-signals-banner .ts-num { font-size: 2rem; }
    }
  </style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div id="aria-live-region" role="status" aria-live="polite" aria-atomic="true"></div>

<main id="main-content">
  <!-- Page title (always visible) -->
  <div class="page-title-block">
    <h1>Weekly Housing Intelligence Brief</h1>
    <p class="page-title-meta" id="headerMeta" aria-live="polite"></p>
  </div>

  <div id="loadingState">Loading latest brief&hellip;</div>
  <div id="errorState" role="alert"></div>
  <div id="briefContent" style="display:none;">

    <!-- Total signal count banner (top) -->
    <div class="total-signals-banner" id="totalSignalsBanner" aria-label="Total signal count this week">
      <div class="ts-num" id="totalSignalsNum">—</div>
      <div class="ts-text">
        <div class="ts-label">total signals detected across all articles this week</div>
        <div class="ts-sub" id="totalSignalsSub"></div>
      </div>
    </div>

    <!-- Meta pills -->
    <div class="pills" id="pillsRow"></div>

    <!-- Signal counts with sort-by capability -->
    <div class="signals-section">
      <div class="signals-section-header">
        <h2>Signal Counts</h2>
        <div class="sort-bar" role="group" aria-label="Sort articles by signal">
          <span class="sort-bar-label">Sort by:</span>
          <button class="sort-btn" data-sort="default" aria-pressed="false">Feed Order</button>
          <button class="sort-btn" data-sort="signals" aria-pressed="false">Most Signals</button>
          <button class="sort-btn is-active" data-sort="date" aria-pressed="true">Newest First</button>
          <button class="sort-btn" data-sort="source" aria-pressed="false">Source</button>
        </div>
      </div>
      <p class="signals-note" id="signalsNote"></p>
      <div class="signal-grid" id="signalGrid"></div>
    </div>

    <!-- Article sections -->
    <div id="sectionsContainer"></div>

    <!-- Archive -->
    <div class="archive-section">
      <h2>Archive</h2>
      <div id="archiveContainer">
        <p style="font-size:.85rem;color:#476080;">Loading archive&hellip;</p>
      </div>
    </div>

  </div>
</main>

<script>
(function () {
  'use strict';

  const BASE = './';
  const VISIBLE_PER_SECTION = 5;

  // Current sort order applied to all sections
  let currentSort = 'date';
  // Raw payload cached for re-renders
  let briefPayload = null;

  function announce(msg) {
    var el = document.getElementById('aria-live-region');
    if (el) el.textContent = msg;
  }

  function showError(msg) {
    var err = document.getElementById('errorState');
    var loading = document.getElementById('loadingState');
    if (loading) loading.style.display = 'none';
    if (err) {
      err.style.display = 'block';
      err.textContent = 'Error: ' + msg;
    }
    announce('Error loading brief: ' + msg);
  }

  function fetchJSON(url) {
    return fetch(url).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' for ' + url);
      return r.json();
    });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(iso) {
    if (!iso) return '';
    // Handle ISO-8601, RFC-2822, date-only, or GDELT seendate (YYYYMMDDTHHMMSSZ) strings
    var clean = iso.trim();
    // Normalise GDELT seendate: 20260316T100000Z → 2026-03-16T10:00:00Z
    if (/^\d{8}T\d{6}Z?$/.test(clean)) {
      clean = clean.slice(0, 4) + '-' + clean.slice(4, 6) + '-' + clean.slice(6, 8) +
              'T' + clean.slice(9, 11) + ':' + clean.slice(11, 13) + ':' + clean.slice(13, 15) + 'Z';
    }
    try {
      var d = new Date(clean);
      if (isNaN(d.getTime())) return iso.trim().slice(0, 10);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch (e) { return iso.trim().slice(0, 10); }
  }

  // ── Sort helpers ────────────────────────────────────────────
  function sortArticles(articles, order) {
    var copy = articles.slice();
    if (order === 'signals') {
      copy.sort(function (a, b) { return (b.signal_count || 0) - (a.signal_count || 0); });
    } else if (order === 'date') {
      copy.sort(function (a, b) {
        var da = a.published ? new Date(a.published).getTime() : 0;
        var db = b.published ? new Date(b.published).getTime() : 0;
        return db - da;  // newest first
      });
    } else if (order === 'source') {
      copy.sort(function (a, b) {
        return (a.source || '').localeCompare(b.source || '');
      });
    }
    // 'default' leaves original order
    return copy;
  }

  // ── Render total signal banner ───────────────────────────────
  function renderTotalSignals(payload) {
    var numEl = document.getElementById('totalSignalsNum');
    var subEl = document.getElementById('totalSignalsSub');
    var total = payload.total_signal_count || 0;
    if (numEl) numEl.textContent = total;
    if (subEl) {
      var parts = [];
      var signals = payload.signals || {};
      Object.keys(signals).forEach(function (bucket) {
        var c = (signals[bucket] || {}).count || 0;
        if (c > 0) parts.push(bucket + ': ' + c);
      });
      subEl.textContent = parts.join(' · ') || '';
    }
  }

  // ── Render pills ────────────────────────────────────────────
  function renderPills(payload) {
    var row = document.getElementById('pillsRow');
    if (!row) return;
    var weekLabel = payload.week_start ? 'Week of ' + fmtDate(payload.week_start) : '';
    var countLabel = (payload.total_articles || 0) + ' articles';
    var genLabel = payload.generated_at ? 'Generated ' + fmtDate(payload.generated_at) : '';
    var pills = [
      weekLabel ? '<span class="pill pill-accent">' + esc(weekLabel) + '</span>' : '',
      '<span class="pill pill-muted">' + esc(countLabel) + '</span>',
      genLabel ? '<span class="pill pill-muted">' + esc(genLabel) + '</span>' : '',
    ].filter(Boolean).join('');
    row.innerHTML = pills;
  }

  // ── Render one article item ──────────────────────────────────
  function renderArticleItem(art, hidden) {
    var meta = [
      art.source ? esc(art.source) : '',
      art.published ? esc(fmtDate(art.published)) : '',
    ].filter(Boolean).join(' &middot; ');

    var summaryHtml = art.summary
      ? '<div class="article-summary">' + esc(art.summary) + '</div>'
      : '';

    var signalTagsHtml = '';
    if (Array.isArray(art.signals) && art.signals.length) {
      signalTagsHtml = '<div class="article-signals">' +
        art.signals.map(function (s) {
          return '<span class="signal-tag">' + esc(s) + '</span>';
        }).join('') +
        '</div>';
    }

    return (
      '<li' + (hidden ? ' class="article-overflow"' : '') + '>' +
      '<a href="' + esc(art.link || '#') + '" target="_blank" rel="noopener noreferrer">' +
      esc(art.title || '(no title)') +
      '</a>' +
      (meta ? '<div class="article-meta">' + meta + '</div>' : '') +
      summaryHtml +
      signalTagsHtml +
      '</li>'
    );
  }

  // ── Render sections ─────────────────────────────────────────
  function renderSections(payload) {
    var container = document.getElementById('sectionsContainer');
    if (!container) return;
    var regions = ['Colorado', 'Western Slope', 'National'];
    var sectionSummaries = payload.section_summaries || {};
    var html = '';

    regions.forEach(function (region) {
      var allArticles = (payload.sections || {})[region] || [];
      var articles = sortArticles(allArticles, currentSort);
      var sectionSummary = sectionSummaries[region] || '';

      html += '<div class="section-card" data-region="' + esc(region) + '">';
      html += '<div class="section-header">';
      html += '<h2>' + esc(region) + '</h2>';
      html += '<span class="section-count">' + articles.length + ' article' + (articles.length !== 1 ? 's' : '') + '</span>';
      html += '</div>';

      if (sectionSummary) {
        html += '<div class="section-summary">' + esc(sectionSummary) + '</div>';
      }

      if (articles.length === 0) {
        html += '<div class="empty-state">No articles this week.</div>';
      } else {
        html += '<ul class="article-list" aria-label="' + esc(region) + ' articles">';
        articles.forEach(function (art, i) {
          html += renderArticleItem(art, i >= VISIBLE_PER_SECTION);
        });
        html += '</ul>';

        var overflow = articles.length - VISIBLE_PER_SECTION;
        if (overflow > 0) {
          html += '<div class="show-more-row">';
          html += '<button class="show-more-btn" type="button" data-region="' + esc(region) + '">' +
            'Show ' + overflow + ' more article' + (overflow !== 1 ? 's' : '') + ' &#9660;' +
            '</button>';
          html += '</div>';
        }
      }

      html += '</div>';
    });

    container.innerHTML = html;

    // Wire up "show more" buttons
    container.querySelectorAll('.show-more-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var card = btn.closest('.section-card');
        if (!card) return;
        card.querySelectorAll('.article-list li.article-overflow').forEach(function (li) {
          li.classList.remove('article-overflow');
        });
        btn.closest('.show-more-row').style.display = 'none';
        announce('Showing all articles for ' + (btn.dataset.region || 'section'));
      });
    });
  }

  // ── Render signals ──────────────────────────────────────────
  function renderSignals(payload) {
    var grid = document.getElementById('signalGrid');
    var note = document.getElementById('signalsNote');
    if (!grid) return;
    if (note) note.textContent = payload.signals_explain || '';
    var signals = payload.signals || {};
    var html = '';
    // Sort buckets by count descending for display
    var buckets = Object.keys(signals).sort(function (a, b) {
      return (signals[b].count || 0) - (signals[a].count || 0);
    });
    buckets.forEach(function (bucket) {
      var data = signals[bucket] || {};
      var count = data.count || 0;
      var terms = (data.top_terms || []).join(', ') || '—';
      html += '<div class="signal-card" data-bucket="' + esc(bucket) + '" tabindex="0" role="button" aria-label="' +
        esc(bucket) + ' signal count: ' + count + '">';
      html += '<h3>' + esc(bucket) + '</h3>';
      html += '<div class="signal-count">' + count + '</div>';
      html += '<div class="signal-terms">' + esc(terms) + '</div>';
      html += '</div>';
    });
    grid.innerHTML = html || '<p style="color:#476080;font-size:.85rem;">No signal data.</p>';
  }

  // ── Render archive ──────────────────────────────────────────
  function renderArchive(index) {
    var container = document.getElementById('archiveContainer');
    if (!container) return;
    var entries = (index && index.entries) || [];
    if (entries.length === 0) {
      container.innerHTML = '<p style="font-size:.85rem;color:#476080;">No archived briefs yet.</p>';
      return;
    }
    var rows = '';
    entries.forEach(function (e) {
      rows += '<tr>';
      rows += '<td><a href="' + esc(e.html_path || '#') + '">' + esc(e.week_start || '') + '</a></td>';
      rows += '<td>' + (e.total_articles || 0) + '</td>';
      rows += '<td><a href="' + esc(e.json_path ? 'data/' + e.json_path : '#') + '">JSON</a></td>';
      rows += '</tr>';
    });
    container.innerHTML =
      '<table class="archive-table" aria-label="Archive of weekly briefs">' +
      '<thead><tr><th>Week</th><th>Articles</th><th>Data</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '</table>';
  }

  // ── Sort bar interaction ────────────────────────────────────
  function initSortBar() {
    document.querySelectorAll('.sort-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var order = btn.dataset.sort || 'default';
        if (order === currentSort) return;
        currentSort = order;

        document.querySelectorAll('.sort-btn').forEach(function (b) {
          b.classList.remove('is-active');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('is-active');
        btn.setAttribute('aria-pressed', 'true');

        if (briefPayload) {
          renderSections(briefPayload);
          announce('Articles sorted by ' + order);
        }
      });
    });
  }

  // ── Init ────────────────────────────────────────────────────
  function init() {
    initSortBar();

    fetchJSON(BASE + 'data/latest.json')
      .then(function (payload) {
        briefPayload = payload;
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('briefContent').style.display = '';

        var headerMeta = document.getElementById('headerMeta');
        if (headerMeta) {
          headerMeta.textContent = payload.week_start
            ? 'Week of ' + fmtDate(payload.week_start)
            : '';
        }

        renderTotalSignals(payload);
        renderPills(payload);
        renderSignals(payload);
        renderSections(payload);

        announce('Weekly brief loaded: ' + (payload.total_articles || 0) +
          ' articles, ' + (payload.total_signal_count || 0) + ' signals for week of ' +
          (payload.week_start || ''));

        return fetchJSON(BASE + 'data/archive-index.json')
          .then(function (index) { renderArchive(index); })
          .catch(function () { renderArchive(null); });
      })
      .catch(function (err) {
        showError(err.message || 'Could not load latest.json');
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
